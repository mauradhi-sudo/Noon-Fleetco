/* ============================================================
   Noon Fleet HRMS — Main Stylesheet
   Edit this file to change the look and feel.
   ============================================================ */
 
/* ─── Reset & Root Variables ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
 
:root{
  /* Brand — Noon Fleet purple + yellow.
     NOTE: the --green* names are kept so the whole app re-themes
     from these three values; they now hold the brand purple. */
  --green:       #3E18A8;   /* brand purple (primary)   */
  --green-dark:  #2A1178;   /* deep purple (hover/press) */
  --green-light: #ECE8FA;   /* pale purple tint (fills)  */
  --brand:       #3E18A8;
  --brand-2:     #5B34D6;
  --yellow:      #FFDD00;   /* noon yellow accent        */
  --yellow-deep: #F2C200;
  --ink:         #17123A;   /* dark sidebar base         */
  --ink-2:       #221a52;
  --red:         #E24B4A;
  --amber:       #EF9F27;
  --blue:        #378ADD;
  /* Surfaces */
  --bg:      #f3f3f8;
  --surface: #fff;
  --border:  rgba(30,20,80,0.09);
  --border-strong: rgba(30,20,80,0.15);
  --hover:   #f7f6fc;
  /* Text */
  --text:  #1a1533;
  --muted: #6a6580;
  --faint: #9c98ae;
  /* Depth + shape */
  --shadow-sm: 0 1px 2px rgba(30,20,80,.06);
  --shadow:    0 2px 12px rgba(30,20,80,.07), 0 1px 2px rgba(30,20,80,.05);
  --shadow-lg: 0 18px 44px -12px rgba(30,20,80,.20);
  --r-sm: 9px; --r: 13px; --r-lg: 18px;
}
 
body{
  font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
 
/* ─── Auth Screen ─────────────────────────────────────────── */
.auth-screen{position:relative;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;overflow:hidden;background:radial-gradient(circle at 18% 22%, #4a1fb8 0%, transparent 55%), radial-gradient(circle at 88% 78%, #5b34d6 0%, transparent 52%), linear-gradient(155deg,#2a1178 0%,#17123a 100%)}
.auth-screen::before{content:'';position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(255,221,0,.16),transparent 70%);bottom:-190px;left:-140px;pointer-events:none}
.auth-screen::after{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);background-size:24px 24px;opacity:.6;pointer-events:none}
.auth-box{position:relative;z-index:1;background:var(--surface);border:1px solid rgba(255,255,255,.5);border-radius:22px;padding:2.6rem 2.4rem;width:100%;max-width:412px;box-shadow:0 34px 80px -22px rgba(8,4,34,.65),0 4px 14px rgba(8,4,34,.24)}
.brand-row{display:flex;align-items:center;gap:12px;margin-bottom:1.8rem}
.brand-icon{width:44px;height:44px;background:var(--green);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;flex-shrink:0}
.brand-title{font-size:19px;font-weight:700;letter-spacing:-.01em}
.brand-sub{font-size:12px;color:var(--muted)}
.role-switch{display:flex;gap:4px;background:#f0eef8;border-radius:11px;padding:4px;margin-bottom:1.5rem}
.role-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:background .12s,color .12s}
.role-btn.active{background:var(--surface);color:var(--green);box-shadow:0 2px 6px rgba(30,20,80,.12)}
.auth-hint{font-size:11.5px;color:var(--faint);margin-top:12px;line-height:1.7;text-align:center}
.error-msg{background:#FCEBEB;color:#A32D2D;border-radius:8px;padding:9px 12px;font-size:12px;margin-bottom:10px}
 
/* ─── Form Fields ─────────────────────────────────────────── */
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border-strong);border-radius:9px;font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;transition:border-color 0.15s,box-shadow 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(62,24,168,.13)}
.field textarea{resize:vertical;min-height:80px}
 
/* ─── Buttons ─────────────────────────────────────────────── */
.btn-primary{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 8px 18px -8px rgba(62,24,168,.6);transition:background .13s,transform .1s}
.btn-primary:hover{background:var(--green-dark)}
.btn-primary:active{transform:translateY(1px)}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text);display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#f5f5f3}
.btn.g{background:var(--green);color:#fff;border:none}
.btn.g:hover{background:var(--green-dark)}
.btn.b{background:#E6F1FB;color:#0C447C;border:none}
.btn.b:hover{background:#B5D4F4}
.btn.r{background:var(--red);color:#fff;border:none}
.btn.r:hover{background:#A32D2D}
.btn.a{background:#FAEEDA;color:#633806;border:none}
.btn.sm{padding:4px 9px;font-size:11px}
 
/* ─── Layout ──────────────────────────────────────────────── */
.app-layout{display:flex;min-height:100vh}
 
/* Sidebar */
.sidebar{width:240px;background:linear-gradient(185deg,var(--ink-2),var(--ink));display:flex;flex-direction:column;flex-shrink:0;padding-top:4px}
.sidebar-brand{padding:1.35rem 1.4rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.09)}
.sidebar-brand .logo-chip{display:inline-flex;background:#fff;border-radius:12px;padding:7px 12px;box-shadow:0 6px 16px rgba(0,0,0,.28)}
.sidebar-brand h2{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.sidebar-brand .dot{width:8px;height:8px;background:var(--yellow);border-radius:50%}
.sidebar-brand small{font-size:11px;color:rgba(255,255,255,.5);display:block;margin-top:11px;letter-spacing:.02em}
.nav-link{display:flex;align-items:center;gap:11px;padding:10px 1.4rem;cursor:pointer;font-size:13px;color:rgba(255,255,255,.66);border-left:2.5px solid transparent;position:relative;user-select:none;font-weight:500;transition:background .12s,color .12s}
.nav-link:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-link:hover i{color:#fff}
.nav-link.active{background:rgba(255,255,255,.09);color:#fff;border-left-color:var(--yellow);font-weight:700}
.nav-link.active i{color:var(--yellow)}
.nav-link i{font-size:17px;flex-shrink:0;color:rgba(255,255,255,.5);transition:color .12s}
.nav-badge{position:absolute;right:12px;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:700}
.sidebar-footer{margin-top:auto;padding:1rem 1.4rem;border-top:1px solid rgba(255,255,255,.09)}
.user-chip{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.user-chip-text{font-size:12px}
.user-chip-text b{display:block;font-weight:600;color:#fff}
.user-chip-text span{color:rgba(255,255,255,.5)}
.logout-btn{width:100%;padding:8px;background:transparent;border:1px solid rgba(255,255,255,.18);border-radius:9px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.72);font-weight:500;transition:background .12s,color .12s}
.logout-btn:hover{background:rgba(255,255,255,.09);color:#fff}
 
/* Main area */
.main-area{flex:1;display:flex;flex-direction:column;overflow:auto;min-width:0}
.topbar{background:rgba(255,255,255,.85);backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar h2{font-size:16px;font-weight:700;letter-spacing:-.01em}
.topbar-actions{display:flex;align-items:center;gap:8px}
.page{padding:1.5rem}
 
/* ─── Avatar ──────────────────────────────────────────────── */
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#C9B8F5,#A98DED);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#2A1178;flex-shrink:0;background-size:cover;background-position:center}
.avatar.lg{width:68px;height:68px;font-size:24px;border-radius:18px;background:linear-gradient(135deg,#D4C6F8,#A98DED);box-shadow:inset 0 0 0 1px rgba(42,17,120,.1);background-size:cover;background-position:center;color:#2A1178}
.avatar.has-photo{color:transparent}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar-wrap .photo-edit{position:absolute;right:-3px;bottom:-3px;width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;border:2.5px solid var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;box-shadow:var(--shadow-sm);transition:background .12s}
.avatar-wrap .photo-edit:hover{background:var(--green-dark)}
 
/* ─── Cards ───────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.1rem;box-shadow:var(--shadow)}
.card-head{padding:1.05rem 1.35rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-head h3{font-size:14px;font-weight:700;letter-spacing:-.01em}
.card-body{padding:1.35rem}
 
/* ─── Stats Row ───────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.05rem;box-shadow:var(--shadow-sm);transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease}
.stat.clickable{cursor:pointer}
.stat.clickable:hover{transform:translateY(-3px);box-shadow:0 12px 26px -10px rgba(62,24,168,.28);border-color:rgba(62,24,168,.35)}
.stat.clickable:active{transform:translateY(-1px)}
.stat .lbl{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;letter-spacing:.01em}
.stat .val{font-size:22px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
 
/* ─── Table ───────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:10.5px;color:var(--muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);font-weight:700;background:#f6f5fb;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--hover)}
 
/* ─── Badges ──────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bg {background:#EAF3DE;color:#3B6D11}  /* green — Active / Approved */
.bb {background:#E6F1FB;color:#185FA5}  /* blue  — Blue collar */
.ba {background:#FAEEDA;color:#854F0B}  /* amber — warning / probation */
.br {background:#FCEBEB;color:#A32D2D}  /* red   — Inactive / Rejected */
.bgr{background:#F1EFE8;color:#5F5E5A}  /* grey  — neutral */
.bp {background:#EEEDFE;color:#3C3489}  /* purple */
 
/* ─── Modal ───────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-start;justify-content:center;padding:2rem;z-index:1000;overflow-y:auto}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:680px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-head{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:15px;font-weight:600}
.close-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
.modal-body{padding:1.4rem;max-height:65vh;overflow-y:auto}
.modal-foot{padding:.9rem 1.4rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}
.section-label{font-size:11px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:0.06em;margin:1.5rem 0 .8rem;padding-bottom:8px;border-bottom:1px solid var(--border)}
.sec-head{display:flex;align-items:center;gap:9px;margin:1.5rem 0 .85rem}
.sec-head .sec-ico{width:30px;height:30px;border-radius:9px;background:var(--green-light);color:var(--green-dark);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sec-head h4{font-size:14.5px;font-weight:700;letter-spacing:-.01em;color:var(--text)}
 
/* ─── Leave Bars ──────────────────────────────────────────── */
.leave-bar{height:6px;border-radius:3px;background:#f0f0ee;overflow:hidden;margin-top:5px}
.leave-fill{height:100%;border-radius:3px;background:var(--green)}
.leave-fill.amber{background:var(--amber)}
.leave-fill.red{background:var(--red)}
.leave-hero{display:flex;align-items:center;gap:1.5rem;background:linear-gradient(135deg,var(--green-light),#fff);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.4rem 1.6rem;margin-bottom:1.1rem;box-shadow:var(--shadow-sm)}
.leave-hero .big{font-size:42px;font-weight:800;letter-spacing:-.03em;color:var(--green-dark);line-height:1}
.leave-hero .big small{font-size:13px;font-weight:600;color:var(--muted);display:block;margin-top:4px;letter-spacing:0}
.leave-hero .lh-divider{width:1px;align-self:stretch;background:var(--border)}
.leave-hero .lh-stat{font-size:12px;color:var(--muted)}
.leave-hero .lh-stat b{display:block;font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px}
.ltcard{background:var(--hover);border:1px solid var(--border);border-radius:11px;padding:.875rem;margin-bottom:8px}
.ltcard h4{font-size:12px;font-weight:600;margin-bottom:6px}
.lt-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px}
 
/* ─── Profile ─────────────────────────────────────────────── */
.profile-header{position:relative;display:flex;align-items:center;gap:1.35rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.5rem 1.6rem;margin-bottom:1.35rem;box-shadow:var(--shadow);overflow:hidden}
.profile-header::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,var(--green),var(--green-dark))}
.profile-name{font-size:20px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.profile-name .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-light)}
.profile-meta{display:flex;gap:18px;font-size:12.5px;color:var(--muted);flex-wrap:wrap;margin-top:8px}
.profile-meta span{display:inline-flex;align-items:center;gap:5px}
.profile-meta i{font-size:14px;color:var(--faint)}
.profile-aside{margin-left:auto;text-align:right;font-size:12px;color:var(--muted);line-height:1.7;flex-shrink:0}
.profile-aside .empno{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.info-cell{background:var(--surface);padding:1rem 1.1rem}
.info-cell .lbl{font-size:10.5px;color:var(--faint);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.info-cell .val{font-size:13.5px;font-weight:500;word-break:break-word;color:var(--text);line-height:1.4}
.tabs-bar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:1.35rem;overflow-x:auto;box-shadow:var(--shadow-sm)}
.tab-btn{padding:9px 15px;cursor:pointer;font-size:13px;color:var(--muted);font-weight:600;border-radius:9px;white-space:nowrap;transition:color .12s,background .12s}
.tab-btn:hover{color:var(--text);background:var(--hover)}
.tab-btn.active{color:#fff;background:var(--green);font-weight:700;box-shadow:0 5px 12px -4px rgba(62,24,168,.5)}
 
/* ─── Payslip PDF ─────────────────────────────────────────── */
.ps-pdf{background:#fff;color:#000;font-family:Arial,sans-serif;max-width:720px;border:1px solid #ccc;margin:0 auto;border-radius:4px;overflow:hidden}
.ps-head{text-align:center;padding:16px;border-bottom:2px solid #222}
.ps-logo-circle{width:48px;height:48px;background:#f5c400;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:6px}
.ps-period{font-size:14px;font-weight:700}
.ps-info-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #222}
.ps-info-left{padding:12px;border-right:1px solid #222;font-size:12px;line-height:2}
.ps-info-right{padding:12px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center}
.ps-body{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #222}
.ps-col-title{background:#f0f0f0;font-size:12px;font-weight:700;padding:7px 12px;border-bottom:1px solid #ddd}
.ps-col-right{border-left:1px solid #222}
.ps-line{display:flex;justify-content:space-between;padding:5px 12px;font-size:11px;border-bottom:0.5px solid #f0f0f0}
.ps-line.total{font-weight:700;font-size:12px;color:var(--green);background:#faf9fe}
.ps-summary{padding:10px 12px;font-size:11px}
.ps-sum-line{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid #eee}
.ps-sum-line.final{font-weight:700;color:var(--green);font-size:13px}
.ps-cf{padding:10px 12px;border-top:1px solid #ddd;background:#fafafa}
.ps-cf-title{font-size:12px;font-weight:700;margin-bottom:6px}
.ps-cf-line{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:0.5px solid #eee}
.ps-note{padding:8px 12px;font-size:10px;color:#888;border-top:1px solid #ddd;line-height:1.7}
 
/* ─── Import Wizard ───────────────────────────────────────── */
.import-steps{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.1rem}
.imp-step{flex:1;padding:10px 12px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--border)}
.imp-step:last-child{border-right:none}
.imp-step.active{background:var(--green-light)}
.imp-step.done{background:#fafaf8}
.imp-step-num{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;color:var(--muted)}
.imp-step.active .imp-step-num,.imp-step.done .imp-step-num{background:var(--green);border-color:var(--green);color:#fff}
.imp-step-lbl{font-size:11px;font-weight:500;color:var(--muted);line-height:1.3}
.imp-step.active .imp-step-lbl{color:var(--green-dark)}
.import-tab-bar{display:flex;gap:5px;background:#f0f0ee;border-radius:9px;padding:4px;margin-bottom:1.1rem}
.import-tab{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted);font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px}
.import-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1)}
 
/* ─── Upload Zone ─────────────────────────────────────────── */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.15s}
.upload-zone:hover,.upload-zone.drag{background:var(--green-light);border-color:var(--green)}
 
/* ─── Alerts ──────────────────────────────────────────────── */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:.875rem;display:flex;align-items:flex-start;gap:8px}
.alert-s{background:#EAF3DE;color:#3B6D11}
.alert-w{background:#FAEEDA;color:#854F0B}
.alert-e{background:#FCEBEB;color:#A32D2D}
.alert-i{background:#E6F1FB;color:#185FA5}
 
/* ─── Misc ────────────────────────────────────────────────── */
.probation-bar{background:#FAEEDA;border:1px solid #FAC775;border-radius:8px;padding:9px 12px;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.doc-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.doc-item:last-child{border-bottom:none}
/* Document checklist rows */
.doc-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;transition:border-color .12s,box-shadow .12s,background .12s}
.doc-row.have{cursor:pointer}
.doc-row.have:hover{border-color:var(--green);box-shadow:var(--shadow);background:var(--hover)}
.doc-row.missing{border-style:dashed;background:#fcfcfb}
.doc-row .doc-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.doc-row .doc-ico.have{background:var(--green-light);color:var(--green-dark)}
.doc-row .doc-ico.missing{background:#f1f0ec;color:var(--faint)}
.doc-row .doc-main{flex:1;min-width:0}
.doc-row .doc-type{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.doc-row .doc-sub{font-size:11.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-row .doc-sub.missing{color:var(--faint);font-style:italic}
.doc-row .doc-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.notif-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.875rem;margin-bottom:7px;display:flex;align-items:flex-start;gap:9px}
.notif-item.na{border-left:3px solid var(--green)}
.notif-item.nr{border-left:3px solid var(--red)}
.notif-item.np{border-left:3px solid var(--amber)}
.loading{text-align:center;padding:3rem;color:var(--muted)}
.loading i{font-size:32px;display:block;margin-bottom:1rem;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
 
/* ─── Mobile / responsive ─────────────────────────────────── */
.burger{display:none;background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:18px;cursor:pointer;color:var(--text);margin-right:10px;flex-shrink:0}
.sidebar-overlay{display:none}
@media(max-width:900px){
  .burger{display:inline-flex;align-items:center}
  .sidebar{position:fixed;top:0;bottom:0;left:-270px;width:255px;z-index:300;transition:left .25s ease;height:100vh}
  .sidebar.open{left:0;box-shadow:0 0 40px rgba(0,0,0,.35)}
  .sidebar-overlay.show{display:block;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:250}
  .topbar{padding:0 .9rem;position:sticky;top:0;z-index:100}
  .topbar h2{font-size:14px}
  .page{padding:.9rem}
  .tbl-wrap table{min-width:760px}
  .info-grid,.form-grid{grid-template-columns:1fr}
  .form-grid .full{grid-column:auto}
  .profile-header{flex-direction:column;align-items:flex-start;gap:.85rem}
  .profile-aside{margin-left:0;text-align:left}
  .leave-hero{flex-wrap:wrap;gap:1rem}
  .leave-hero .lh-divider{display:none}
  .import-steps{flex-wrap:wrap}.imp-step{min-width:46%;border-bottom:1px solid var(--border)}
  .topbar-actions{flex-wrap:wrap;gap:6px;justify-content:flex-end}
  .modal{max-width:96vw}
  .modal-body{max-height:70vh}
  .ps-body,.ps-info-row{grid-template-columns:1fr}
  .ps-col-right{border-left:none;border-top:1px solid #222}
  .ps-info-right{align-items:flex-start;border-top:1px solid #ddd}
  .auth-box{padding:1.5rem}
}
 
/* ─── Print: payslip only ─────────────────────────────────── */
@media print{
  .sidebar,.topbar,.no-print,.stats-row,.import-steps,.tabs-bar,.alert{display:none!important}
  .main-area{margin:0!important}.page{padding:0!important}
  body{background:#fff!important}
  .card{border:none;box-shadow:none}
  .ps-pdf{border:1px solid #ccc;max-width:100%}
}
 
</style>

<script>
/* ── Production bootstrap: talks to the real API (no browser mock) ── */
var _CFG = { empFields: [], payEarn: [], payDed: [], docTypes: [] };
 
function auditLog(action) {
  try {
    if (window.S && S.token && action)
      fetch('/api/audit', { method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.token },
        body: JSON.stringify({ action: action }) });
  } catch (e) {}
}
 
function saveDB() {
  try {
    if (window.S && S.token)
      fetch('/api/config', { method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.token },
        body: JSON.stringify(_CFG) });
  } catch (e) {}
}
 
async function loadCfg() {
  try {
    const r = await fetch('/api/config', { headers: { 'Authorization': 'Bearer ' + S.token } });
    if (r.ok) { const c = await r.json();
      _CFG.empFields = c.empFields || []; _CFG.payEarn = c.payEarn || []; _CFG.payDed = c.payDed || []; _CFG.docTypes = c.docTypes || []; }
  } catch (e) {}
}
 
function resetDB() {
  alert('This is the live system — records are stored in the central database with daily backups.\nContact the main admin for data corrections.');
}
</script>

  if (!d) return '—';
  const p = String(d).split('T')[0].split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
}
function fmt(v)       { return v || '—'; }
function getInit(n)   { return (n || '').split(' ').slice(0, 2).map(x => x[0]).join('').toUpperCase(); }
// Avatar: shows the employee photo if set, otherwise initials. `big` => large profile size.
function avatarEl(emp, big, extra) {
  const cls = (big ? 'avatar lg' : 'avatar') + (emp && emp.photo ? ' has-photo' : '');
  const st  = (extra || '') + (emp && emp.photo ? `;background-image:url('${emp.photo}')` : '');
  return `<div class="${cls}" style="${st}">${emp && emp.photo ? '' : getInit(emp && emp.name)}</div>`;
}
function n2(v)        { return parseFloat(String(v || 0).replace(/,/g, '')) || 0; }
function aed(v)       { const x = n2(v); return 'AED ' + (x || 0).toLocaleString(); }
function isInProb(emp){ if (!emp || !emp.joiningDate) return false; return (new Date() - new Date(emp.joiningDate)) / 864e5 < 182; }
 
function calcAL(jd) {
  if (!jd) return { accrued: 0, months: 0 };
  const days = Math.max(0, (new Date() - new Date(jd)) / 864e5);
  const m    = Math.min(days / 30.44, 12);
  return { accrued: Math.floor((m / 12) * 26), months: Math.floor(m) };
}
 
function getLeaveBal(leaves, jd) {
  const app  = (leaves || []).filter(l => l.status === 'Approved');
  const alU  = app.filter(l => l.type === 'Annual Leave').reduce((s, l) => s + l.days, 0);
  const slFU = app.filter(l => l.type === 'Sick Leave (Full)').reduce((s, l) => s + l.days, 0);
  const slHU = app.filter(l => l.type === 'Sick Leave (Half Pay)').reduce((s, l) => s + l.days, 0);
  const slPU = app.filter(l => l.type === 'Sick Leave (Unpaid)').reduce((s, l) => s + l.days, 0);
  const al   = calcAL(jd);
  return {
    al: { total: al.accrued, used: alU, balance: Math.max(0, al.accrued - alU), months: al.months },
    sl: {
      full:   { total: 15, used: slFU, balance: Math.max(0, 15 - slFU) },
      half:   { total: 15, used: slHU, balance: Math.max(0, 15 - slHU) },
      unpaid: { total: 15, used: slPU, balance: Math.max(0, 15 - slPU) }
    }
  };
}
 
/* ─── API Wrapper ──────────────────────────────────────────── */
async function api(method, path, data, isFormData) {
  const opts = { method, headers: {} };
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token;
  if (data && !isFormData) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(data);
  } else if (isFormData) {
    opts.body = data; // FormData sets its own content-type
  }
  const res = await fetch(API + '/api' + path, opts);
  let json = null;
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('application/json')) { try { json = await res.json(); } catch (e) { json = null; } }
  else { try { await res.text(); } catch (e) {} }
  if (!res.ok) {
    // A 401 on an authenticated call means the token is no longer valid
    // (expired, or the server's secret changed) — return to the login screen
    // cleanly instead of leaving the page stuck on "Loading…".
    if (res.status === 401 && S.token && !path.startsWith('/auth/')) {
      S.token = ''; S.user = null; S.screen = 'login';
      try { localStorage.removeItem('hrms_token'); localStorage.removeItem('hrms_user'); } catch (e) {}
      S.loginErr = 'Your session expired — please sign in again.';
      R();
    }
    throw new Error((json && json.error) || (res.status === 404 ? 'That action is not available on the server (404).' : ('Request failed (' + res.status + ')')));
  }
  return json || {};
}
 
async function loadData(force) {
  try {
    if (S.screen === 'admin') {
      if (!S.employees     || force) S.employees     = await api('GET', '/employees');
      if (!S.leaves        || force) S.leaves        = await api('GET', '/leaves');
      if (!S.payslips      || force) S.payslips      = await api('GET', '/payslips');
      if (!S.documents     || force) S.documents     = await api('GET', '/documents');
      if (!S.assetSummary  || force) { try { S.assetSummary = await api('GET', '/assets/summary'); } catch (e) {} }
      if (!S.assets        || force) { try { S.assets = await api('GET', '/assets'); } catch (e) {} }
      if (!S.attSummary    || force) { try { S.attSummary = await api('GET', '/attendance/summary'); } catch (e) {} }
    } else if (S.screen === 'employee') {
      if (!S.leaves        || force) S.leaves        = await api('GET', '/leaves');
      if (!S.payslips      || force) S.payslips      = await api('GET', '/payslips');
      if (!S.documents     || force) S.documents     = await api('GET', '/documents');
      if (!S.notifications || force) S.notifications = await api('GET', '/notifications');
      if (!S.allocations   || force) S.allocations   = await api('GET', '/accommodation/allocations');
      if (!S.assets        || force) { try { S.assets = await api('GET', '/assets'); } catch (e) { S.assets = []; } }
      if (!S.attendance    || force) { try { S.attendance = await api('GET', '/attendance'); } catch (e) { S.attendance = []; } }
    }
  } catch (e) { console.error('loadData error:', e); }
}

/* ─── OTP Admin Login ──────────────────────────────────────── */
async function requestOtp() {
  const email = (document.getElementById('admin-email')?.value || '').trim();
  if (!email) { S.loginErr = 'Please enter your email address'; R(); return; }
  S.otpEmail   = email;
  S.otpSending = true;
  S.loginErr   = '';
  R();
  try {
    const res = await api('POST', '/auth/admin/request-otp', { email });
    S.otpStep    = 'otp';
    S.otpSending = false;
    // In dev mode the OTP is returned in the response for testing
    S.devOtp = res._devOtp || '';
    if (res._devOtp) {
      S.loginErr = '';
      console.log('DEV MODE — OTP:', res._devOtp);
    }
    R();
    setTimeout(() => { document.getElementById('otp-input')?.focus(); }, 100);
  } catch (e) {
    S.loginErr   = e.message;
    S.otpSending = false;
    R();
  }
}
 
async function verifyOtp() {
  const otp = (document.getElementById('otp-input')?.value || '').trim();
  if (!otp) { S.loginErr = 'Please enter the code'; R(); return; }
  S.loginErr = '';
  try {
    const res = await api('POST', '/auth/admin/verify-otp', { email: S.otpEmail, otp });
    S.token = res.token;
    S.user  = res;
    localStorage.setItem('hrms_token', res.token);
    localStorage.setItem('hrms_user', JSON.stringify(res));
    await loadCfg();
    S.screen    = 'admin';
    S.nav       = 'dashboard';
    S.otpStep   = 'email';
    auditLog('Admin signed in: ' + res.email);
    S.otpEmail  = '';
    S.employees = S.leaves = S.payslips = S.notifications = S.documents = null;
    await loadData();
    R();
  } catch (e) {
    S.loginErr = e.message;
    R();
  }
}
 
/* ─── Employee Login ───────────────────────────────────────── */
async function doLogin() {
  S.loginErr = '';
  const id   = (document.getElementById('lid')?.value || '').trim();

    if (res._devOtp) console.log('DEV MODE — Employee OTP:', res._devOtp);
    R();
    setTimeout(() => { document.getElementById('emp-otp')?.focus(); }, 100);
  } catch (e) {
    S.loginErr = e.message;
    R();
  }

async function verifyEmpOtp() {
  const otp = (document.getElementById('emp-otp')?.value || '').trim();
  if (!otp) { S.loginErr = 'Please enter the code'; R(); return; }
  S.loginErr = '';
  try {
    const res = await api('POST', '/auth/employee/verify-otp', { empId: S.empOtpId, otp });
    S.token = res.token;
    S.user  = res;
    localStorage.setItem('hrms_token', res.token);
    localStorage.setItem('hrms_user', JSON.stringify(res));
    await loadCfg();

    R();

  </div>`;
}
function _progCard(icon, color, bg, lbl, have, total, onclick) {
  const pc = total ? Math.round(have / total * 100) : 0;
  return `<div class="stat${onclick ? ' clickable' : ''}" style="${onclick ? 'cursor:pointer' : ''}" ${onclick ? `onclick="${onclick}"` : ''}>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="width:44px;height:44px;border-radius:12px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:22px;color:${color}"><i class="ti ${icon}"></i></div>
      <span style="font-size:12.5px;font-weight:800;color:${color};font-variant-numeric:tabular-nums">${pc}%</span>
    </div>
    <div style="font-size:25px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.05">${(have||0).toLocaleString()} <span style="font-size:13px;color:var(--faint);font-weight:600">/ ${(total||0).toLocaleString()}</span></div>
    <div style="font-size:12.5px;color:var(--muted);font-weight:600;margin-top:5px">${lbl}</div>
    <div style="height:6px;margin-top:11px;border-radius:99px;background:rgba(30,20,80,.08);overflow:hidden"><div style="height:100%;width:${pc}%;border-radius:99px;background:${color}"></div></div>
  </div>`;
}
function _posBars(emps, label) {
  const byPos = {}; emps.forEach(e => { const k = e.position || 'Other'; byPos[k] = (byPos[k] || 0) + 1; });
  const rows = Object.entries(byPos).sort((a, b) => b[1] - a[1]); const max = rows.length ? rows[0][1] : 1; const tot = emps.length || 1;
  return `<div class="card"><div class="card-head"><h3>Headcount by position</h3><span style="font-size:11px;color:var(--muted)">${rows.length} positions &middot; ${label || 'all staff'}</span></div>
    <div class="card-body">${rows.length ? rows.map(([p, n]) => `
      <div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${p}</span><b>${n.toLocaleString()} <span style="color:var(--muted);font-weight:400">(${(n / tot * 100).toFixed(1)}%)</span></b></div>
      <div class="leave-bar" style="height:8px"><div class="leave-fill" style="width:${Math.round(n / max * 100)}%"></div></div></div>`).join('') : '<div style="color:var(--muted);font-size:13px">No staff records yet.</div>'}</div></div>`;
}
function _expiringCard(emps, field, days, icon, label, onclick) {
  const cutoff = new Date(Date.now() + days * 864e5).toISOString().slice(0, 10);
  const list = emps.filter(e => e[field] && e[field] <= cutoff);
  return _dCard(icon, 'var(--red)', '#FCEBEB', label, list.length.toLocaleString(), `expiring within ${days} days`, onclick);
}

      ${(CFG.docTypes || []).map((x, i) => `<div class="doc-item"><span style="font-size:13px"><i class="ti ${x.icon||'ti-file-text'}" style="color:var(--muted)"></i> ${x.label}</span>

function addEntity(kind) {
  const v = (document.getElementById('add-' + kind)?.value || '').trim();
  if (!v) return;
  if (kind === 'emp') CFG.empFields.push({ key: v.toLowerCase().replace(/[^a-z0-9]+/g, '_'), label: v });
  else if (kind === 'earn') CFG.payEarn.push(v);
  else CFG.payDed.push(v);
  saveDB(); auditLog('Added ' + (kind === 'emp' ? 'employee custom field' : 'payroll entity') + ': ' + v); R();
}
function rmEntity(kind, i) {
  const arr = kind === 'emp' ? CFG.empFields : kind === 'earn' ? CFG.payEarn : CFG.payDed;
  auditLog('Removed ' + (kind === 'emp' ? 'employee custom field' : 'payroll entity') + ': ' + (arr[i].label || arr[i]));
  arr.splice(i, 1); saveDB(); R();
}
// Custom document fields (extra checklist slots, e.g. "Driving Licence", "Insurance Card").
function addDocField(fromSettings) {
  if (!canManageDocTypes()) { alert('You do not have permission to add document fields.'); return; }
  const v = (fromSettings ? (document.getElementById('add-doc')?.value || '') : (prompt('New document field name (e.g. Driving Licence, Insurance Card):') || '')).trim();
  if (!v) return;
  const key = 'doc_' + v.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
  CFG.docTypes = CFG.docTypes || [];
  if (CFG.docTypes.some(t => t.key === key)) { alert('That document field already exists.'); return; }
  CFG.docTypes.push({ key, label: v, icon: 'ti-file-text' });
  saveDB(); auditLog('Added document field: ' + v); R();
}
function rmDocField(i) {
  if (!canManageDocTypes()) return;
  if (!confirm('Remove this document field? Uploaded files are kept and will appear under "Other documents".')) return;
  auditLog('Removed document field: ' + (CFG.docTypes[i]?.label || ''));
  CFG.docTypes.splice(i, 1); saveDB(); R();
}

function copyDashMetric() {
  const t = document.getElementById('dashmetric-table');
  if (!t) { alert('Nothing to copy.'); return; }
  const lines = [];
  t.querySelectorAll('tr').forEach(tr => {
    const cells = [...tr.querySelectorAll('th,td')].map(c => (c.innerText || '').replace(/\s+/g, ' ').trim());
    if (cells.length) lines.push(cells.join('\t'));
  });
  const text = lines.join('\n');
  const done = () => { const b = document.getElementById('copy-dm-btn'); if (b) { const o = b.innerHTML; b.innerHTML = '<i class="ti ti-check"></i> Copied ' + (lines.length - 1) + ' rows'; setTimeout(() => b.innerHTML = o, 1600); } };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else { fallbackCopy(text, done); }
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb && cb(); } catch (e) { alert('Copy is not supported in this browser — please select the table manually.'); }
  ta.remove();
}

// Download a server report with the auth token attached (plain <a> links can't
// carry the bearer token, so we fetch → blob → save).
async function downloadReport(path, filename) {
  try {
    const res = await fetch(API + '/api' + path, { headers: { 'Authorization': 'Bearer ' + S.token } });
    if (!res.ok) { let m = 'Download failed'; try { m = (await res.json()).error || m; } catch (e) {} throw new Error(m); }
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  } catch (e) { alert('Could not download: ' + e.message); }
}

// Open/download a document via the authenticated API (browser links can't carry
// the bearer token, so fetch → blob → open in a new tab, with a download fallback).
async function viewDoc(id) {
  // Open the tab synchronously inside the click gesture — opening it AFTER the
  // await gets blocked by the browser's popup blocker (that was the "can't view" bug).
  const w = window.open('', '_blank');
  if (w) { try { w.document.write('<p style="font-family:sans-serif;padding:20px;color:#666">Loading document…</p>'); } catch (e) {} }
  try {
    const res = await fetch(API + '/api/documents/' + id + '/download', { headers: { 'Authorization': 'Bearer ' + S.token } });
    if (!res.ok) { let m = 'Could not open this file'; try { m = (await res.json()).error || m; } catch (e) {} throw new Error(m); }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (w && !w.closed) {
      w.location.href = url;
    } else {
      const doc = (S.documents || []).find(x => x.id === id);
      const a = document.createElement('a');
      a.href = url; a.download = (doc && doc.name) || 'document';
      document.body.appendChild(a); a.click(); a.remove();
    }
    setTimeout(() => URL.revokeObjectURL(url), 120000);
  } catch (e) { if (w && !w.closed) w.close(); alert(e.message); }
}

const ATT_BADGE = { Present: 'bg', Absent: 'br', Leave: 'ba', Off: 'bgr' };
function attBadge(s) { return `<span class="badge ${ATT_BADGE[s] || 'bgr'}">${s || '—'}</span>`; }
// Parse a date-ish column header into YYYY-MM-DD; returns '' if it isn't a date.
function parseAttDate(h) {
  if (h == null || h === '') return '';
  if (typeof h === 'number' && h > 20000 && h < 90000) { const d = new Date(Math.round((h - 25569) * 86400 * 1000)); return isNaN(d) ? '' : d.toISOString().slice(0, 10); }
  const s = String(h).trim(); let m;
  if ((m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/))) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  if ((m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/))) return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  const d = new Date(s); return isNaN(d) ? '' : d.toISOString().slice(0, 10);
}
// Build & download a wide-format attendance template: Employee ID, Name, then a week of date columns.
function downloadAttTemplate() {
  const days = [];
  const base = new Date();
  for (let i = 6; i >= 0; i--) { const d = new Date(base); d.setDate(base.getDate() - i); days.push(d.toISOString().slice(0, 10)); }
  const header = ['Employee ID', 'Employee Name', ...days];
  const emps = (S.employees || []).filter(e => e.status !== 'Inactive');
  const rows = emps.map(e => [e.empId || '', e.name || '', ...days.map(() => '')]);
  if (!rows.length) rows.push(['SN1366', 'Sample Employee', ...days.map((_, i) => i === 6 ? 'P' : '')]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([header, ...rows]), 'Attendance');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
    ['Noon Fleet HRMS — Attendance upload'],
    [''],
    ['1. Each row is one employee. Keep the "Employee ID" column — it must match the HRMS ID.'],
    ['2. Each date column (YYYY-MM-DD) is one day. Add as many day columns as you need.'],
    ['3. Mark each cell:  P = Present   A = Absent   L = Leave   O = Week off / holiday'],
    ['4. Leave a cell blank to skip that day for that person.'],
    ['5. Re-uploading the same day overwrites the previous value (safe to correct mistakes).'],
  ]), 'Read me');
  XLSX.writeFile(wb, 'NoonFleet_Attendance_Template.xlsx');
}
function handleAttFile(file) {
  if (!file) return;
  const fb = document.getElementById('att-fb');
  if (fb) fb.innerHTML = `<div class="alert alert-i"><i class="ti ti-loader"></i> Reading ${file.name}…</div>`;
  parseFile(file, raw => {
    if (!raw || raw.length < 2) { if (fb) fb.innerHTML = `<div class="alert alert-e">File is empty or unreadable.</div>`; return; }
    const hdr = raw[0].map(h => h);
    const idIdx = hdr.findIndex(h => /employee\s*id|emp\s*id|empid|staff\s*id/i.test(String(h || '')));
    if (idIdx === -1) { if (fb) fb.innerHTML = `<div class="alert alert-e">No "Employee ID" column found in the first row.</div>`; return; }
    // every column that parses as a date is a day column
    const dateCols = hdr.map((h, i) => ({ i, date: parseAttDate(h) })).filter(c => c.date && c.i !== idIdx);
    if (!dateCols.length) { if (fb) fb.innerHTML = `<div class="alert alert-e">No date columns found. Use headers like 2026-06-25.</div>`; return; }
    const rows = [];
    for (let r = 1; r < raw.length; r++) {
      const empId = String(raw[r][idIdx] || '').trim();
      if (!empId) continue;
      for (const c of dateCols) {
        const val = String(raw[r][c.i] || '').trim();
        if (val) rows.push({ empId, date: c.date, status: val });
      }
    }
    S.attRows = rows;
    S.attStep = 2;
    R();
  });
}
async function doAttImport() {
  if (!S.attRows || !S.attRows.length) return;

    S.attRows = null; S.attStep = 1;

    R();
    alert(`✓ Attendance saved.\n\nNew: ${res.added||0}\nUpdated: ${res.updated||0}\nSkipped: ${res.skipped||0}${res.unknown&&res.unknown.length?`\n\nUnknown IDs (not in HRMS): ${res.unknown.join(', ')}`:''}`);
  } catch (e) { alert('Error: ' + e.message); }
}

  const recentCard = `<div class="card">

      ? `<p style="text-align:center;padding:2rem;color:var(--muted)">No attendance uploaded yet. Download the template, fill it in, and upload.</p>`
      : `<table><thead><tr><th>Employee</th><th>Date</th><th>Status</th><th>Updated</th></tr></thead>
      <tbody>${recent.slice(0,300).map(a => `<tr><td>${empName(a.employeeId)}</td><td>${fmtDate(a.date)}</td><td>${attBadge(a.status)}</td><td style="font-size:11px;color:var(--muted)">${a.updatedBy||''}</td></tr>`).join('')}</tbody></table>`}
    </div>
  </div>`;

  return `<div style="margin-bottom:1.4rem"><h1 style="font-size:21px;font-weight:800;letter-spacing:-.02em;margin:0;color:var(--text)">Attendance</h1><p style="margin:4px 0 0;font-size:12.5px;color:var(--muted)">Daily present / absent / leave tracking${s.lastDate?` &mdash; as of ${lastStr}`:''}</p></div>` + summary + uploadCard + recentCard;
}
// client-side status normaliser (mirror of the server's, for the preview table)
function normAttClient(v) {
  const s = String(v||'').trim().toLowerCase();
  if (['p','present','pr','1','y','yes','wfh','work'].includes(s)) return 'Present';
  if (['a','absent','ab','0','n','no'].includes(s)) return 'Absent';
  if (['l','leave','lv','al','sl'].includes(s)) return 'Leave';
  if (['o','off','wo','weekoff','week off','holiday','h'].includes(s)) return 'Off';
  return s ? s.charAt(0).toUpperCase()+s.slice(1) : '';
}

/* ─── Data Export (offline workflow) ───────────────────────── */
function dlCurrentData(fmt0) {
  const ECOLS = EMP_COLS.concat(CFG.empFields.map(f => ({ k: 'cf_' + f.key, l: f.label, r: false })));
  const rows = (S.employees || []).map(e => ECOLS.map(c => e[c.k] !== undefined ? e[c.k] : ''));
  const stamp = new Date().toISOString().slice(0, 10);
  if (fmt0 === 'xlsx' && window.XLSX) {
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([ECOLS.map(c => c.l), ...rows]);
    ws['!cols'] = ECOLS.map(() => ({ wch: 18 }));
    XLSX.utils.book_append_sheet(wb, ws, 'Employees');
    XLSX.writeFile(wb, `NoonFleet_Employees_${stamp}.xlsx`);
  } else {
    const csv = [ECOLS.map(c => c.l), ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = `NoonFleet_Employees_${stamp}.csv`;
    a.click();
  }
  auditLog(`Exported full employee data (${(S.employees||[]).length} records, ${fmt0.toUpperCase()})`);
}

async function bulkDocUpload(files) {
  if (!files || !files.length) return;
  const empByNo = {}; (S.employees || []).forEach(e => { if (e.empId) empByNo[String(e.empId).toUpperCase()] = e; });
  const byEmp = {}; const unmatched = [];
  [...files].forEach(f => {
    const rel = f.webkitRelativePath || f.name;
    const segs = rel.split('/').filter(Boolean);
    let emp = null;
    for (const sg of segs) { if (empByNo[sg.toUpperCase()]) { emp = empByNo[sg.toUpperCase()]; break; } }
    if (emp) { (byEmp[emp.id] = byEmp[emp.id] || { emp, files: [] }).files.push(f); }
    else unmatched.push(rel);
  });
  const groups = Object.values(byEmp);
  const totalMatched = groups.reduce((s, g) => s + g.files.length, 0);
  if (!totalMatched) { alert('No files matched an employee-number folder.\nName each subfolder with the employee number (e.g. 30001) so files land on the right profile.'); return; }
  if (!confirm(`Upload ${totalMatched} file(s) to ${groups.length} employee profile(s)?` + (unmatched.length ? `\n${unmatched.length} file(s) are not inside an employee-number folder and will be skipped.` : ''))) return;
  const cats = allDocCategories();
  let okN = 0, typedN = 0; const fail = [];
  for (const g of groups) {
    for (const f of g.files) {
      // Map the filename to a document type so it lands in the right checklist slot (e.g. "passport.pdf" \u2192 Passport)
      const probe = { name: f.name, type: '' };
      const cat = cats.find(c => docMatchesCat(probe, c));
      const docType = cat ? cat.label : 'Other';
      if (cat) typedN++;
      const fd = new FormData();
      fd.append('employeeId', g.emp.id);
      fd.append('name', cat ? cat.label : (f.name || 'document'));
      fd.append('type', docType);
      fd.append('category', 'employee');
      fd.append('file', f);
      try { await api('POST', '/documents', fd, true); okN++; } catch (e) { fail.push(f.name + ' \u2014 ' + e.message); }
    }
  }
  S.documents = await api('GET', '/documents');
  alert(`\u2713 ${okN} document(s) uploaded to their employee profiles.\n\u2022 ${typedN} auto-sorted into the right slot (Passport, Visa, EID, \u2026) by filename.` + (unmatched.length ? `\n\u2022 ${unmatched.length} skipped (not in an employee-number folder).` : '') + (fail.length ? `\n\u2717 Failed:\n` + fail.join('\n') : ''));
  R();
}
 
function docFileIcon(typeOrDoc) {
  // Accepts a doc object (preferred — uses the filename extension) or a type/mime string.
  const d = (typeOrDoc && typeof typeOrDoc === 'object') ? typeOrDoc : null;
  const hay = (d ? `${d.filename || ''} ${d.type || ''} ${d.name || ''}` : String(typeOrDoc || '')).toLowerCase();
  if (hay.includes('pdf')) return 'ti-file-type-pdf';
  if (/(image|jpg|jpeg|png|webp|heic)/.test(hay)) return 'ti-photo';
  if (/(word|docx|\.doc)/.test(hay)) return 'ti-file-type-doc';
  if (/(excel|xlsx|\.xls|csv)/.test(hay)) return 'ti-file-type-xls';
  return 'ti-file-description';
}

/* Match a document to an employee. Primary: stored employeeId === internal id.
   Fallback: the employee NUMBER embedded in the stored file path (e.g. 'employee/17812/x.pdf'),
   which stays stable even if the internal id changed after a roster re-import. */
function docEmpNo(d) { const f = String((d && d.filename) || ''); if (!f.includes('/')) return ''; const parts = f.split('/').filter(Boolean); return parts.length >= 2 ? parts[parts.length - 2] : ''; }
function docBelongsTo(d, emp) { if (!emp || !d) return false; if (d.employeeId === emp.id) return true; const no = docEmpNo(d); return !!no && !!emp.empId && no.toUpperCase() === String(emp.empId).toUpperCase(); }

/* Standard document types we expect on file. A doc matches by keyword in its type or name. */
const DOC_CATEGORIES = [
  { key: 'passport',  label: 'Passport',          icon: 'ti-book-2',       kw: ['passport'] },
  { key: 'visa',      label: 'Visa / E-visa',      icon: 'ti-plane',        kw: ['visa', 'e-visa', 'evisa'] },
  { key: 'eid',       label: 'Emirates ID',        icon: 'ti-id',           kw: ['eid', 'emirates', 'emirate id'] },
  { key: 'residence', label: 'Residence / Labour', icon: 'ti-home-2',       kw: ['residence', 'residency', 'labour', 'labor'] },
  { key: 'contract',  label: 'Contract',           icon: 'ti-file-text',    kw: ['contract', 'offer'] },
  { key: 'medical',   label: 'Medical / Fitness',  icon: 'ti-stethoscope',  kw: ['medical', 'fitness', 'health'] },
];
// Built-in categories + any custom document fields the admin added (stored in config).
function allDocCategories() {
  const custom = (CFG.docTypes || []).map(t => ({
    key: t.key, label: t.label, icon: t.icon || 'ti-file-text', custom: true,
    kw: [String(t.label || '').toLowerCase(), ...String(t.label || '').toLowerCase().split(/[^a-z0-9]+/).filter(w => w.length > 2)]
  }));
  return DOC_CATEGORIES.concat(custom);
}
function docMatchesCat(d, cat) {
  const hay = ((d.type || '') + ' ' + (d.name || '')).toLowerCase();
  return cat.kw.some(k => k && hay.includes(k));
}
function canManageDocTypes() { return S.user?.isSuperAdmin || (S.user?.permissions||[]).includes('manage_settings'); }
function canReviewDocs() { return S.user?.isSuperAdmin || (S.user?.permissions||[]).includes('upload_documents') || (S.user?.permissions||[]).includes('review_documents'); }
function docRowActions(d, isAdmin) { return docActions(d, isAdmin); }
// The reusable checklist: one row per standard document type, plus any extra uploads under "Other".
function docChecklist(docs, opts) {
  const isAdmin = !!opts.isAdmin;
  const canUpload = opts.canUpload !== false;
  const used = new Set();
  const rows = allDocCategories().map(cat => {
    const d = docs.find(x => !used.has(x.id) && docMatchesCat(x, cat));
    if (d) {
      used.add(d.id);
      return `<div class="doc-row have" onclick="viewDoc('${d.id}')">
        <div class="doc-ico have"><i class="ti ${cat.icon}"></i></div>
        <div class="doc-main">
          <div class="doc-type">${cat.label} ${docReviewBadge(d.reviewStatus)}</div>
          <div class="doc-sub">${d.name} · uploaded ${fmtDate(d.uploadedAt)}${d.uploader ? ` by ${d.uploader}` : ''}</div>
        </div>
        ${docRowActions(d, isAdmin)}
      </div>`;
    }
    return `<div class="doc-row missing">
      <div class="doc-ico missing"><i class="ti ${cat.icon}"></i></div>
      <div class="doc-main">
        <div class="doc-type" style="color:var(--muted)">${cat.label}</div>
        <div class="doc-sub missing">Not uploaded yet</div>
      </div>
      <div class="doc-actions">${canUpload ? `<button class="btn sm b" onclick="uploadDocFor('${cat.label.replace(/'/g,"\\'")}','${opts.uploadModal}')"><i class="ti ti-upload"></i> Upload</button>` : `<span class="badge bgr" style="font-size:10px">Missing</span>`}</div>
    </div>`;
  }).join('');
  const extras = docs.filter(x => !used.has(x.id));
  const extraRows = extras.length ? `<div class="section-label" style="margin-top:1.2rem">Other documents</div>` + extras.map(d => `
    <div class="doc-row have" onclick="viewDoc('${d.id}')">
      <div class="doc-ico have"><i class="ti ${docFileIcon(d)}"></i></div>
      <div class="doc-main">
        <div class="doc-type">${d.name} ${docReviewBadge(d.reviewStatus)}</div>
        <div class="doc-sub">${d.type || 'Document'} · uploaded ${fmtDate(d.uploadedAt)}${d.uploader ? ` by ${d.uploader}` : ''}</div>
      </div>
      ${docRowActions(d, isAdmin)}
    </div>`).join('') : '';
  return rows + extraRows;
}

function renderDocumentsTab(docs, empId, isAdmin) {
  const cats = allDocCategories();
  const required = cats.filter(c => docs.some(d => docMatchesCat(d, c))).length;
  return `<div class="card">
    <div class="card-head">
      <h3>Documents <span style="font-weight:500;color:var(--muted);font-size:12px">· ${required}/${cats.length} key docs on file</span></h3>
      <div style="display:flex;gap:7px">

      </div>

    <div class="card-body">${docChecklist(docs, { isAdmin, uploadModal: 'uploadDocEmp' })}</div>
  </div>`;
}

function renderOnbModal() {
  const e = S.onbEmp; if (!e) return '';
  const editable = ONBOARDING_FIELDS.filter(f => canUpdateOnbField(f.perm));
  const locked   = ONBOARDING_FIELDS.filter(f => !canUpdateOnbField(f.perm));
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()" style="max-width:520px">
    <div class="modal-head"><h3>Update onboarding — ${e.name}</h3><button class="close-btn" onclick="openModal(null)"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="alert alert-i" style="margin-bottom:1rem"><i class="ti ti-info-circle"></i><div>You can update the milestone date(s) you have permission for. Leave a field unchanged to keep its current value.</div></div>
      <div class="form-grid">
        ${editable.map(f => `<div class="field"><label>${f.label}</label><input id="onb_${f.field}" type="date" value="${e[f.field] || ''}"/></div>`).join('')}
      </div>
      ${locked.length ? `<div class="section-label" style="margin-top:1rem">Locked (no permission)</div>
      <div class="form-grid">${locked.map(f => `<div class="field"><label>${f.label}</label><input type="date" value="${e[f.field] || ''}" disabled style="background:#f1f0ec;color:var(--muted)"/></div>`).join('')}</div>` : ''}
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="openModal(null)">Cancel</button>
      <button class="btn g" onclick="saveOnboarding('${e.id}')">Save dates</button>
    </div>
  </div></div>`;
}
async function saveOnboarding(empId) {
  const body = {};
  for (const f of ONBOARDING_FIELDS) {
    if (!canUpdateOnbField(f.perm)) continue;
    const el = document.getElementById('onb_' + f.field);
    if (el) body[f.field] = el.value || '';
  }
  try {
    const res = await api('PATCH', `/employees/${empId}/onboarding`, body);
    S.employees = await api('GET', '/employees');
    if (S.viewEmp && S.viewEmp.id === empId) { const fresh = S.employees.find(x => x.id === empId); if (fresh) S.viewEmp = fresh; }
    S.modal = null; S.onbEmp = null;
    R();
    auditLog && auditLog(`Onboarding updated: ${(res.applied||[]).join(', ')}`);
  } catch (e) { alert('Error: ' + e.message); }
}

/* ─── Action Handlers ──────────────────────────────────────── */
function gv(id)       { return document.getElementById(id)?.value || ''; }
function openModal(m) { S.modal = m; R(); }
function closeModal(e){ if (!e || e.target === e.currentTarget) { S.modal = null; R(); } }
 
function toggleCertField() {
  const lt = gv('lt');
  const el = document.getElementById('cert-lbl-txt');
  if (el) el.innerHTML = lt.startsWith('Sick')
    ? 'Medical certificate <span style="color:var(--red)">* Required for sick leave</span>'
    : 'Supporting document <span style="color:var(--muted)">(optional)</span>';
}
 
async function setNav(n) {
  S.nav = n;
  S.sideOpen = false;
  if (n !== 'empview') S.viewEmp = null;
  S.profileTab = 'personal';
  S.viewPayslip = null;
  if (n === 'audit') { try { S.auditList = await api('GET', '/audit'); } catch (e) {} }
  if (n === 'admins') {
    await loadAdmins();
    return;
  }
  if (n === 'accommodation') { await loadAccommodation(true); R(); return; }
  if (n === 'assets') { await loadAssets(true); R(); return; }
  if (n === 'attendance') {
    S.attStep = 1; S.attRows = null;
    if (!S.employees) { try { S.employees = await api('GET', '/employees'); } catch (e) {} }
    try { S.attSummary = await api('GET', '/attendance/summary'); } catch (e) {}
    try { S.attAll = await api('GET', '/attendance'); } catch (e) { S.attAll = []; }
    R(); return;
  }
  await loadData(false);
  R();
}
 
async function viewEmp(id) {
  // Always fetch the full single record so the profile has the photo (stripped from the list for speed).
  let emp; try { emp = await api('GET', `/employees/${id}`); } catch (e) { emp = (S.employees || []).find(e => e.id === id); }
  S.viewEmp = emp;
  if (!S.leaves)    S.leaves    = await api('GET', '/leaves');
  if (!S.payslips)  S.payslips  = await api('GET', '/payslips');
  if (!S.documents) S.documents = await api('GET', '/documents');
  await loadAccommodation(false);
  await loadAssets(false);
  if (!S.accHistory) { try { S.accHistory = await api('GET', '/accommodation/history'); } catch (e) { S.accHistory = []; } }
  S.nav = 'empview';
  S.profileTab = 'personal';
  R();
}

async function submitLeave() {
  const type = gv('lt'), fromDate = gv('lf'), toDate = gv('lt2'), reason = gv('lr');
  if (!fromDate || !toDate) { alert('Please select dates'); return; }
  if (new Date(toDate) < new Date(fromDate)) { alert('Date error: the "To" date must be on or after the "From" date.'); return; }
  if (type.startsWith('Sick') && !document.getElementById('certfile')?.files[0]) {
    alert('Please upload a medical certificate for sick leave.'); return;
  }
  const days = Math.max(1, Math.floor((new Date(toDate) - new Date(fromDate)) / 864e5) + 1);
  try {
    const certF = document.getElementById('certfile')?.files[0];
    let certDocId = '';
    if (certF) {
      const cfd = new FormData();
      cfd.append('name', certF.name);
      cfd.append('type', 'Leave Certificate');
      cfd.append('category', 'leave');
      if (S.viewEmp?.id) cfd.append('employeeId', S.viewEmp.id);
      cfd.append('file', certF);
      try { const up = await api('POST', '/documents', cfd, true); certDocId = up?.id || ''; } catch (e) {}
    }
    const res = await api('POST', '/leaves', {
      type, fromDate, toDate, days, reason,
      employeeId: S.viewEmp?.id,
      certificate: !!certF,
      certDocId,
      certificateName: certF ? certF.name : ''
    });
    S.leaves = await api('GET', '/leaves');
    S.notifications = await api('GET', '/notifications');
    S.documents = await api('GET', '/documents');
    S.modal  = null;
    alert(`✓ Leave submitted!\nConfirmation email sent to: ${res.emailSentTo || 'your email'}`);
    R();
  } catch (e) { alert('Error: ' + e.message); }
}
 
async function decideLeave(id, decision) {
  try {
    const res = await api('PATCH', `/leaves/${id}/decide`, { decision, by: S.user?.name || '' });
    S.leaves  = await api('GET', '/leaves');
    if (S.modal === 'viewCert') { S.modal = null; S.viewCertLeave = null; }
    auditLog(`Leave ${id}: ${res.message}`);
    alert(`✓ ${res.message}!\n\n${res.emailPreview?.body || ''}`);
    R();
  } catch (e) { alert('Error: ' + e.message); }
}
 
async function saveDoc() {
  const file = document.getElementById('docfile')?.files[0];
  if (!file) { alert('Please choose a file first.'); return; }
  const fd   = new FormData();
  fd.append('name', gv('dn') || gv('dtype') || 'Document');
  fd.append('type', gv('dtype') || 'Other');
  // Link the upload to the right employee: explicit picker (global page) or the open profile.
  if (S.modal === 'uploadDoc') fd.append('employeeId', gv('de'));
  else if (S.modal === 'uploadDocEmp' && S.viewEmp) fd.append('employeeId', S.viewEmp.id);
  // (uploadDocSelf → server uses the logged-in employee automatically)
  fd.append('file', file);
  try {
    await api('POST', '/documents', fd, true);
    S.documents = await api('GET', '/documents');
    S.docUploadType = null;
    S.modal = null;
    R();
  } catch (e) { alert('Error: ' + e.message); }
}

// Clear Approve / Reject buttons. Once decided, shows the decision + a reset control.
function reviewControls(d) {
  if (!canReviewDocs()) return '';
  const s = d.reviewStatus || 'Pending';
  if (s === 'Approved' || s === 'Rejected') {
    return `<button class="btn sm" title="Reset to pending" onclick="reviewDoc('${d.id}','Pending')"><i class="ti ti-rotate-2"></i></button>`;
  }
  return `<button class="btn sm" style="background:#EAF3DE;color:#3B6D11;border:none" title="Approve" onclick="reviewDoc('${d.id}','Approved')"><i class="ti ti-check"></i> Approve</button>
    <button class="btn sm" style="background:#FCEBEB;color:#A32D2D;border:none" title="Reject" onclick="reviewDoc('${d.id}','Rejected')"><i class="ti ti-x"></i> Reject</button>`;
}
// Replace the file on an existing document (upload new, then remove the old record).
function replaceDoc(id) {
  const d = (S.documents || []).find(x => x.id === id); if (!d) return;
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.pdf,.jpg,.jpeg,.png,.docx';
  inp.onchange = async () => {
    const f = inp.files && inp.files[0]; if (!f) return;
    try {
      const fd = new FormData();
      fd.append('file', f);
      fd.append('name', d.name || 'Document');
      fd.append('type', d.type || 'Other');
      if (d.employeeId) fd.append('employeeId', d.employeeId);
      await api('POST', '/documents', fd, true);
      await api('DELETE', `/documents/${id}`);
      S.documents = await api('GET', '/documents');
      R();
    } catch (e) { alert('Replace failed: ' + e.message); }
  };
  inp.click();
}
// Shared action bar for a document row.
function docActions(d, isAdmin) {
  const canUp = S.user?.isSuperAdmin || (S.user?.permissions||[]).includes('upload_documents');
  return `<div class="doc-actions" onclick="event.stopPropagation()">
    ${d.filename ? `<button class="btn sm" onclick="viewDoc('${d.id}')" title="Open in a new tab"><i class="ti ti-eye"></i> View</button>` : ''}
    ${isAdmin ? reviewControls(d) : ''}
    ${isAdmin && canUp ? `<button class="btn sm" title="Replace file" onclick="replaceDoc('${d.id}')"><i class="ti ti-refresh"></i></button>` : ''}
    ${isAdmin && canUp ? `<button class="btn sm" style="color:var(--red)" title="Delete" onclick="deleteDoc('${d.id}')"><i class="ti ti-trash"></i></button>` : ''}
  </div>`;
}

// Profile photo: pick a file, resize it to a small square thumbnail in the browser, then save as base64.
function changePhoto(empId) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/png,image/jpeg,image/webp';
  inp.onchange = () => { const f = inp.files && inp.files[0]; if (f) uploadPhotoFile(f, empId); };
  inp.click();
}
function uploadPhotoFile(file, empId) {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = async () => {
      try {
        const size = 320;
        const scale = Math.max(size / img.width, size / img.height);
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const cv = document.createElement('canvas'); cv.width = size; cv.height = size;
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        const dataUrl = cv.toDataURL('image/jpeg', 0.82);
        await api('POST', `/employees/${empId}/photo`, { photo: dataUrl });
        if (S.viewEmp && S.viewEmp.id === empId) S.viewEmp.photo = dataUrl;
        S.employees = await api('GET', '/employees');
        if (S.viewEmp && S.viewEmp.id === empId) { const fresh = S.employees.find(x => x.id === empId); if (fresh) S.viewEmp = fresh; }
        R();
      } catch (e) { alert('Could not save photo: ' + e.message); }
    };
    img.onerror = () => alert('That file could not be read as an image.');
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

/* ─── File Parsing ─────────────────────────────────────────── */
function parseFile(file, onRaw) {
  const isXls = file.name.match(/\.xlsx?$/i);
  const reader = new FileReader();
  if (isXls) {
    reader.onload = e => {
      const wb  = XLSX.read(e.target.result, { type: 'array' });
      onRaw(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' }));
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload = e => {
      const sep = e.target.result.includes('\t') ? '\t' : ',';
      onRaw(e.target.result.split('\n').filter(l => l.trim())
        .map(l => l.split(sep).map(v => v.replace(/^"|"$/g, '').trim())));
    };
    reader.readAsText(file);
  }
}
 
function handleEmpFile(file) {
  if (!file) return;
  const fb = document.getElementById('emp-fb');
  if (fb) fb.innerHTML = `<div class="alert alert-i"><i class="ti ti-loader"></i> Reading ${file.name}…</div>`;
  parseFile(file, raw => {
    if (!raw || raw.length < 2) {
      if (fb) fb.innerHTML = `<div class="alert alert-e">File empty or unreadable</div>`;
      return;
    }
    const hdr    = raw[0].map(h => String(h || '').trim());
    const COLS   = EMP_COLS.concat(CFG.empFields.map(f => ({ k: 'cf_' + f.key, l: f.label, r: false })));
    const colMap = {};
    COLS.forEach(c => {
      const i = hdr.findIndex(h => h === c.l || h === c.k);
      if (i >= 0) colMap[c.k] = i;
    });
    if (!Object.keys(colMap).length) {
      if (fb) fb.innerHTML = `<div class="alert alert-e">Could not match columns. Use the Noon Fleet employee template.</div>`;
      return;
    }
    const rows = [];
    for (let i = 1; i < raw.length; i++) {
      if (raw[i].every(c => !c)) continue;
      const obj = { _row: i + 1 };
      COLS.forEach(c => {
        const idx = colMap[c.k];
        obj[c.k]  = idx !== undefined ? String(raw[i][idx] || '').trim() : '';
      });
      const errs = [];
      EMP_REQ.forEach(k => { if (!obj[k]) errs.push(`${EMP_COLS.find(c => c.k === k)?.l || k} required`); });
      if (obj.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(obj.email)) errs.push('Invalid email');
      if (obj.gender && !['Male', 'Female'].includes(obj.gender)) errs.push('Gender: Male or Female');
      obj._errs = errs;
      obj._isUpdate = !!(obj.empId && (S.employees || []).some(e => e.empId === obj.empId));
      rows.push(obj);
    }
    S.empImportRows = rows;
    setTimeout(() => { S.empImportStep = 3; R(); }, 300);
  });
}

async function loadAdmins() {
  try { S.adminsList = await api('GET', '/admins'); R(); }
  catch(e) { console.error('Failed to load admins:', e.message); }
}
 
function editAdmin(id) {
  S.editingAdmin = S.adminsList.find(a => a.id === id);
  openModal('addAdmin');
}
 
async function deleteAdmin(id, name) {
  if (!confirm('Remove admin access for ' + name + '?')) return;
  try {
    await api('DELETE', '/admins/' + id);
    await loadAdmins();
  } catch(e) { alert('Error: ' + e.message); }
}
 
function getCheckedPerms() {
  return ALL_PERMISSIONS.map(([key]) => key).filter(key => document.getElementById('perm-'+key)?.checked);
}
 
async function saveNewAdmin() {
  const name  = (document.getElementById('adm-name')?.value||'').trim();
  const email = (document.getElementById('adm-email')?.value||'').trim();
  const permissions = getCheckedPerms();
  if (!name||!email) { alert('Name and email are required'); return; }
  try {
    await api('POST', '/admins', { name, email, permissions });
    S.modal = null; S.editingAdmin = null;
    auditLog(`Created limited admin ${email} [${permissions.join(', ')||'view-only'}]`);
    await loadAdmins();
    alert('✓ Admin created! Invitation email sent to ' + email);
  } catch(e) { alert('Error: ' + e.message); }
}
 
async function saveEditAdmin() {
  const id    = S.editingAdmin.id;
  const name  = (document.getElementById('adm-name')?.value||'').trim();
  const email = (document.getElementById('adm-email')?.value||'').trim();
  const permissions = getCheckedPerms();
  try {
    await api('PUT', '/admins/' + id, { name, email, permissions });
    S.modal = null; S.editingAdmin = null;
    await loadAdmins();
  } catch(e) { alert('Error: ' + e.message); }
}
 
/* ─── Accommodation (Camps · Rooms · Bed Allocation) ───────── */
function accCanManage() {
  return !!(S.user && (S.user.isSuperAdmin || (S.user.permissions || []).includes('manage_accommodation')));
}
function accCanAssign() {
  return accCanManage() || !!(S.user && (S.user.permissions || []).includes('assign_beds'));
}

async function loadAccommodation(force) {
  try {
    if (!S.employees || force) {
      try { S.employees = await api('GET', '/employees'); } catch (e) { if (!S.employees) S.employees = []; }
    }
    if (!S.camps       || force) S.camps       = await api('GET', '/accommodation/camps');
    if (!S.accRooms    || force) S.accRooms    = await api('GET', '/accommodation/rooms');
    if (!S.allocations || force) S.allocations = await api('GET', '/accommodation/allocations');
  } catch (e) { console.error('loadAccommodation error:', e); }
}

// Bed numbers (1..capacity) that are free in a room. A bed held by `employeeId`
// is treated as free so an existing occupant can keep their bed when reassigned.
function freeBeds(room, employeeId) {
  if (!room) return [];
  const taken = {};
  (room.beds || []).forEach(b => {
    if (String(b.employeeId) !== String(employeeId || '')) taken[String(b.bed)] = true;
  });
  const out = [];
  for (let i = 1; i <= (+room.capacity || 0); i++) if (!taken[String(i)]) out.push(i);
  return out;
}

/* ─── Accommodation handlers ───────────────────────────────── */
async function saveCamp() {
  const name = gv('camp-name').trim();
  if (!name) { alert('Please enter a camp name.'); return; }
  try {
    await api('POST', '/accommodation/camps', { name });
    S.modal = null;
    await loadAccommodation(true);
    R();
  } catch (e) { alert('Error: ' + e.message); }
}

async function deleteCamp(id) {
  const c = (S.camps || []).find(x => x.id === id);
  const name = c ? c.name : 'this camp';
  if (!confirm('Delete camp ' + name + '? Any rooms in it must be removed first.')) return;
  try {
    await api('DELETE', '/accommodation/camps/' + id);
    await loadAccommodation(true);
    R();
  } catch (e) { alert('Error: ' + e.message); }
}

function openRoomModal(id) {
  S.editingRoom = id ? ((S.accRooms || []).find(r => r.id === id) || null) : null;
  openModal('roomModal');
}

async function saveRoom() {
  const editing = !!S.editingRoom;
  const campId = gv('room-camp');
  const roomNo = gv('room-no').trim();
  const capacity = parseInt(gv('room-cap'), 10) || 1;
  const building = gv('room-building').trim();
  const floor = gv('room-floor').trim();
  if (!campId || !roomNo) { alert('Camp and room number are required.'); return; }
  try {
    if (editing) {
      await api('PATCH', '/accommodation/rooms/' + S.editingRoom.id, { roomNo, capacity, building, floor });
    } else {
      await api('POST', '/accommodation/rooms', { campId, roomNo, capacity, building, floor });
    }
    S.modal = null; S.editingRoom = null;
    await loadAccommodation(true);
    R();
  } catch (e) { alert('Error: ' + e.message); }
}

async function deleteRoom(id) {
  const r = (S.accRooms || []).find(x => x.id === id);
  const label = r ? ('room ' + r.roomNo) : 'this room';
  if (!confirm('Delete ' + label + '? All beds in it must be vacant first.')) return;
  try {
    await api('DELETE', '/accommodation/rooms/' + id);
    await loadAccommodation(true);
    R();
  } catch (e) { alert('Error: ' + e.message); }
}

function openAssignModal(employeeId) {
  const existing = employeeId ? (S.allocations || []).find(a => a.employeeId === employeeId) : null;
  S.assignDraft = {
    employeeId: employeeId || '',
    campId:  existing ? existing.campId : '',
    roomId:  existing ? existing.roomId : '',
    bed:     existing ? String(existing.bed) : '',
    checkIn: existing && existing.checkIn ? String(existing.checkIn).split('T')[0] : new Date().toISOString().slice(0, 10),
    lockEmp: !!employeeId
  };
  openModal('assignBed');
}

function accAssignCamp(v) {
  if (!S.assignDraft) S.assignDraft = {};
  S.assignDraft.campId = v;
  S.assignDraft.roomId = '';
  S.assignDraft.bed = '';
  R();
}

function accAssignRoom(v) {
  if (!S.assignDraft) S.assignDraft = {};
  S.assignDraft.roomId = v;
  S.assignDraft.bed = '';
  R();
}

async function saveAssign() {
  const d = S.assignDraft || {};

  sim:  ['number', 'provider', 'puk', 'remarks'],

// Accepted column headers (lower-cased) for bulk asset upload → internal field.
// '__pn' = "Plate / Number" which maps to plate for bikes, number for SIMs.
const ASSET_ALIAS = {
  'bike id': 'code', 'sim id': 'code', 'asset id': 'code', 'asset code': 'code', 'code': 'code', 'id': 'code',
  'name': 'name', 'name / description': 'name', 'description': 'name',
  'status': 'status',
  'plate': 'plateNo', 'plate number': 'plateNo', 'plate no': 'plateNo', 'plateno': 'plateNo', 'plate / number': '__pn',
  'chassis no': 'chassisNo', 'chassis number': 'chassisNo', 'chassisno': 'chassisNo', 'chassis': 'chassisNo',
  'engine no': 'engineNo', 'engine number': 'engineNo', 'engineno': 'engineNo', 'engine': 'engineNo',
  'brand': 'brand', 'model': 'model',
  'registration expiry': 'registrationExpiry', 'reg. expiry': 'registrationExpiry', 'reg expiry': 'registrationExpiry', 'registrationexpiry': 'registrationExpiry', 'registration': 'registrationExpiry',
  'insurance expiry': 'insuranceExpiry', 'ins. expiry': 'insuranceExpiry', 'ins expiry': 'insuranceExpiry', 'insuranceexpiry': 'insuranceExpiry', 'insurance': 'insuranceExpiry',
  'number': 'number', 'sim number': 'number', 'mobile number': 'number', 'msisdn': 'number',
  'provider': 'provider', 'puk': 'puk', 'remarks': 'remarks', 'note': 'remarks', 'notes': 'remarks',
  'assign to': 'assignTo', 'assign to (employee id)': 'assignTo', 'assigned to': 'assignTo', 'assign to employee id': 'assignTo', 'holder id': 'assignTo', 'holder': 'assignTo', 'employee id': 'assignTo', 'emp id': 'assignTo',
  'assigned date': 'assignedDate', 'assigned on': 'assignedDate', 'assign date': 'assignedDate',
};
function isoDate(v) {
  if (v == null || v === '') return '';
  if (v instanceof Date && !isNaN(v)) {
    const z = n => String(n).padStart(2, '0');
    return v.getFullYear() + '-' + z(v.getMonth() + 1) + '-' + z(v.getDate());
  }
  const s = String(v).trim();
  const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  return m ? `${m[1]}-${String(m[2]).padStart(2, '0')}-${String(m[3]).padStart(2, '0')}` : s;
}
function assetStatuses(type) {
  if (type === 'bike') return ['Available', 'Assigned', 'Maintenance', 'Accident', 'Inactive'];
  if (type === 'sim')  return ['Available', 'Assigned', 'Blocked', 'Lost', 'Inactive'];
  return ['Available', 'Assigned', 'Inactive'];
}
function assetStatusBadge(s) {
  const map = { Available: 'bg', Assigned: 'bb', Maintenance: 'ba', Accident: 'br', Blocked: 'br', Lost: 'br', Inactive: 'bgr' };
  return `<span class="badge ${map[s] || 'bgr'}">${s || '—'}</span>`;
}
function daysLeft(d) {
  if (!d) return null;
  const t = new Date(String(d).split('T')[0]);
  if (isNaN(t)) return null;
  return Math.ceil((t - new Date(new Date().toISOString().slice(0, 10))) / 86400000);
}
function expiryCell(d) {
  if (!d) return '<span style="color:var(--faint)">—</span>';
  const n = daysLeft(d);
  let col = 'var(--text)';
  if (n != null && n <= 7) col = 'var(--red)';
  else if (n != null && n <= 30) col = 'var(--amber)';
  const tag = n != null ? (n < 0 ? ' (expired)' : n <= 30 ? ` (${n}d)` : '') : '';
  return `<span style="color:${col};font-weight:${(n!=null&&n<=30)?'700':'400'}">${fmtDate(d)}${tag}</span>`;
}
function assetTypeLabel(t) { return t === 'bike' ? 'Bike' : t === 'sim' ? 'SIM' : 'Asset'; }

// Template and export share one 3-sheet layout so a downloaded file can be
// edited and re-uploaded. Sheet name decides the asset type.
const ASSET_SHEETS = [
  ['Bikes', 'bike',  ['Bike ID', 'Plate No', 'Chassis No', 'Engine No', 'Brand', 'Model', 'Registration Expiry', 'Insurance Expiry', 'Status', 'Assign To (Employee ID)', 'Assigned Date']],
  ['SIMs',  'sim',   ['SIM ID', 'Number', 'Provider', 'PUK', 'Remarks', 'Status', 'Assign To (Employee ID)', 'Assigned Date']],
  ['Other', 'other', ['Asset ID', 'Name / Description', 'Status', 'Assign To (Employee ID)', 'Assigned Date']],
];
function assetSheetType(name) {
  const n = String(name || '').toLowerCase();
  if (n.includes('bike')) return 'bike';
  if (n.includes('sim'))  return 'sim';
  return 'other';
}

function downloadAssetTemplate() {

  const wb = XLSX.utils.book_new();
  const info = [
    ['Noon Fleet — Asset bulk upload template'],
    [''],
    ['HOW TO USE'],
    ['1. Use one sheet per asset type: Bikes, SIMs, Other. Sheets you don\'t need can be left empty.'],
    ['2. The first column (Bike ID / SIM ID / Asset ID) is REQUIRED — it is the unique code for the asset.'],
    ['3. Re-uploading a row whose ID already exists UPDATES that asset. A new ID is ADDED. Blank cells are left unchanged when updating.'],
    ['4. All dates must be in YYYY-MM-DD format, e.g. 2026-03-01.'],
    ['5. To record who holds an asset, put their Employee ID (e.g. SN0002) in "Assign To (Employee ID)". The status is set to Assigned automatically.'],
