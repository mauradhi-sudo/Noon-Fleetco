<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Noon Fleet HRMS</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.40.0/tabler-icons.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ============================================================
   Noon Fleet HRMS — Main Stylesheet
   Edit this file to change the look and feel.
   ============================================================ */

/* ─── Reset & Root Variables ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Brand colours */
  --green:       #1D9E75;
  --green-dark:  #0F6E56;
  --green-light: #E1F5EE;
  --red:         #E24B4A;
  --amber:       #EF9F27;
  --blue:        #378ADD;
  /* Surfaces */
  --bg:      #f5f5f3;
  --surface: #fff;
  --border:  rgba(0,0,0,0.1);
  /* Text */
  --text:  #1a1a1a;
  --muted: #666;
  --faint: #999;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
}

/* ─── Auth Screen ─────────────────────────────────────────── */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.brand-row{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
.brand-icon{width:44px;height:44px;background:var(--green);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;flex-shrink:0}
.brand-title{font-size:18px;font-weight:600}
.brand-sub{font-size:12px;color:var(--muted)}
.role-switch{display:flex;gap:4px;background:#f0f0ee;border-radius:9px;padding:4px;margin-bottom:1.5rem}
.role-btn{flex:1;padding:7px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted)}
.role-btn.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.auth-hint{font-size:11px;color:var(--faint);margin-top:10px;line-height:1.7;text-align:center}
.error-msg{background:#FCEBEB;color:#A32D2D;border-radius:7px;padding:9px 12px;font-size:12px;margin-bottom:10px}

/* ─── Form Fields ─────────────────────────────────────────── */
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;transition:border-color 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green)}
.field textarea{resize:vertical;min-height:80px}

/* ─── Buttons ─────────────────────────────────────────────── */
.btn-primary{width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:var(--green-dark)}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text);display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#f5f5f3}
.btn.g{background:var(--green);color:#fff;border:none}
.btn.g:hover{background:var(--green-dark)}
.btn.b{background:#E6F1FB;color:#0C447C;border:none}
.btn.b:hover{background:#B5D4F4}
.btn.r{background:var(--red);color:#fff;border:none}
.btn.r:hover{background:#A32D2D}
.btn.a{background:#FAEEDA;color:#633806;border:none}
.btn.sm{padding:4px 9px;font-size:11px}

/* ─── Layout ──────────────────────────────────────────────── */
.app-layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:235px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.sidebar-brand h2{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.sidebar-brand .dot{width:8px;height:8px;background:var(--green);border-radius:50%}
.sidebar-brand small{font-size:11px;color:var(--muted);display:block;margin-top:2px}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 1.5rem;cursor:pointer;font-size:13px;color:var(--muted);border-left:2px solid transparent;position:relative;user-select:none}
.nav-link:hover{background:#f9f9f7;color:var(--text)}
.nav-link.active{background:var(--green-light);color:var(--green);border-left-color:var(--green);font-weight:500}
.nav-link i{font-size:16px;flex-shrink:0}
.nav-badge{position:absolute;right:12px;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600}
.sidebar-footer{margin-top:auto;padding:1rem 1.5rem;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.user-chip-text{font-size:12px}
.user-chip-text b{display:block;font-weight:600}
.user-chip-text span{color:var(--muted)}
.logout-btn{width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:12px;color:var(--muted)}
.logout-btn:hover{background:#f5f5f3}

/* Main area */
.main-area{flex:1;display:flex;flex-direction:column;overflow:auto;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:16px;font-weight:600}
.topbar-actions{display:flex;align-items:center;gap:8px}
.page{padding:1.5rem}

/* ─── Avatar ──────────────────────────────────────────────── */
.avatar{width:32px;height:32px;border-radius:50%;background:#9FE1CB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#085041;flex-shrink:0}
.avatar.lg{width:56px;height:56px;font-size:18px}

/* ─── Cards ───────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.1rem}
.card-head{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-head h3{font-size:14px;font-weight:600}
.card-body{padding:1.25rem}

/* ─── Stats Row ───────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem}
.stat .lbl{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.stat .val{font-size:22px;font-weight:700}

/* ─── Table ───────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:11px;color:var(--muted);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-weight:600;background:#fafaf8;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}

/* ─── Badges ──────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bg {background:#EAF3DE;color:#3B6D11}  /* green — Active / Approved */
.bb {background:#E6F1FB;color:#185FA5}  /* blue  — Blue collar */
.ba {background:#FAEEDA;color:#854F0B}  /* amber — warning / probation */
.br {background:#FCEBEB;color:#A32D2D}  /* red   — Inactive / Rejected */
.bgr{background:#F1EFE8;color:#5F5E5A}  /* grey  — neutral */
.bp {background:#EEEDFE;color:#3C3489}  /* purple */

/* ─── Modal ───────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-start;justify-content:center;padding:2rem;z-index:1000;overflow-y:auto}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:680px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-head{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:15px;font-weight:600}
.close-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
.modal-body{padding:1.4rem;max-height:65vh;overflow-y:auto}
.modal-foot{padding:.9rem 1.4rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}
.section-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin:1.1rem 0 .7rem;padding-bottom:5px;border-bottom:1px solid var(--border)}

/* ─── Leave Bars ──────────────────────────────────────────── */
.leave-bar{height:6px;border-radius:3px;background:#f0f0ee;overflow:hidden;margin-top:5px}
.leave-fill{height:100%;border-radius:3px;background:var(--green)}
.leave-fill.amber{background:var(--amber)}
.leave-fill.red{background:var(--red)}
.ltcard{background:#fafaf8;border:1px solid var(--border);border-radius:9px;padding:.875rem;margin-bottom:8px}
.ltcard h4{font-size:12px;font-weight:600;margin-bottom:6px}
.lt-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px}

/* ─── Profile ─────────────────────────────────────────────── */
.profile-header{display:flex;align-items:center;gap:1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.profile-meta{display:flex;gap:14px;font-size:12px;color:var(--muted);flex-wrap:wrap;margin-top:6px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-cell{background:#fafaf8;border-radius:8px;padding:.875rem}
.info-cell .lbl{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:3px;text-transform:uppercase}
.info-cell .val{font-size:13px;font-weight:500;word-break:break-all}
.tabs-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.tab-btn{padding:7px 14px;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}

/* ─── Payslip PDF ─────────────────────────────────────────── */
.ps-pdf{background:#fff;color:#000;font-family:Arial,sans-serif;max-width:720px;border:1px solid #ccc;margin:0 auto;border-radius:4px;overflow:hidden}
.ps-head{text-align:center;padding:16px;border-bottom:2px solid #222}
.ps-logo-circle{width:48px;height:48px;background:#f5c400;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:6px}
.ps-period{font-size:14px;font-weight:700}
.ps-info-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #222}
.ps-info-left{padding:12px;border-right:1px solid #222;font-size:12px;line-height:2}
.ps-info-right{padding:12px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center}
.ps-body{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #222}
.ps-col-title{background:#f0f0f0;font-size:12px;font-weight:700;padding:7px 12px;border-bottom:1px solid #ddd}
.ps-col-right{border-left:1px solid #222}
.ps-line{display:flex;justify-content:space-between;padding:5px 12px;font-size:11px;border-bottom:0.5px solid #f0f0f0}
.ps-line.total{font-weight:700;font-size:12px;color:var(--green);background:#f9fff9}
.ps-summary{padding:10px 12px;font-size:11px}
.ps-sum-line{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid #eee}
.ps-sum-line.final{font-weight:700;color:var(--green);font-size:13px}
.ps-cf{padding:10px 12px;border-top:1px solid #ddd;background:#fafafa}
.ps-cf-title{font-size:12px;font-weight:700;margin-bottom:6px}
.ps-cf-line{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:0.5px solid #eee}
.ps-note{padding:8px 12px;font-size:10px;color:#888;border-top:1px solid #ddd;line-height:1.7}

/* ─── Import Wizard ───────────────────────────────────────── */
.import-steps{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.1rem}
.imp-step{flex:1;padding:10px 12px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--border)}
.imp-step:last-child{border-right:none}
.imp-step.active{background:var(--green-light)}
.imp-step.done{background:#fafaf8}
.imp-step-num{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;color:var(--muted)}
.imp-step.active .imp-step-num,.imp-step.done .imp-step-num{background:var(--green);border-color:var(--green);color:#fff}
.imp-step-lbl{font-size:11px;font-weight:500;color:var(--muted);line-height:1.3}
.imp-step.active .imp-step-lbl{color:#085041}
.import-tab-bar{display:flex;gap:5px;background:#f0f0ee;border-radius:9px;padding:4px;margin-bottom:1.1rem}
.import-tab{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted);font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px}
.import-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1)}

/* ─── Upload Zone ─────────────────────────────────────────── */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.15s}
.upload-zone:hover,.upload-zone.drag{background:var(--green-light);border-color:var(--green)}

/* ─── Alerts ──────────────────────────────────────────────── */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:.875rem;display:flex;align-items:flex-start;gap:8px}
.alert-s{background:#EAF3DE;color:#3B6D11}
.alert-w{background:#FAEEDA;color:#854F0B}
.alert-e{background:#FCEBEB;color:#A32D2D}
.alert-i{background:#E6F1FB;color:#185FA5}

/* ─── Misc ────────────────────────────────────────────────── */
.probation-bar{background:#FAEEDA;border:1px solid #FAC775;border-radius:8px;padding:9px 12px;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.doc-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.doc-item:last-child{border-bottom:none}
.notif-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.875rem;margin-bottom:7px;display:flex;align-items:flex-start;gap:9px}
.notif-item.na{border-left:3px solid var(--green)}
.notif-item.nr{border-left:3px solid var(--red)}
.notif-item.np{border-left:3px solid var(--amber)}
.loading{text-align:center;padding:3rem;color:var(--muted)}
.loading i{font-size:32px;display:block;margin-bottom:1rem;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Mobile / responsive ─────────────────────────────────── */
.burger{display:none;background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:18px;cursor:pointer;color:var(--text);margin-right:10px;flex-shrink:0}
.sidebar-overlay{display:none}
@media(max-width:900px){
  .burger{display:inline-flex;align-items:center}
  .sidebar{position:fixed;top:0;bottom:0;left:-270px;width:255px;z-index:300;transition:left .25s ease;height:100vh}
  .sidebar.open{left:0;box-shadow:0 0 40px rgba(0,0,0,.35)}
  .sidebar-overlay.show{display:block;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:250}
  .topbar{padding:0 .9rem;position:sticky;top:0;z-index:100}
  .topbar h2{font-size:14px}
  .page{padding:.9rem}
  .tbl-wrap table{min-width:760px}
  .info-grid,.form-grid{grid-template-columns:1fr}
  .form-grid .full{grid-column:auto}
  .profile-header{flex-direction:column;align-items:flex-start;gap:.75rem}
  .import-steps{flex-wrap:wrap}.imp-step{min-width:46%;border-bottom:1px solid var(--border)}
  .topbar-actions{flex-wrap:wrap;gap:6px;justify-content:flex-end}
  .modal{max-width:96vw}
  .modal-body{max-height:70vh}
  .ps-body,.ps-info-row{grid-template-columns:1fr}
  .ps-col-right{border-left:none;border-top:1px solid #222}
  .ps-info-right{align-items:flex-start;border-top:1px solid #ddd}
  .auth-box{padding:1.5rem}
}

/* ─── Print: payslip only ─────────────────────────────────── */
@media print{
  .sidebar,.topbar,.no-print,.stats-row,.import-steps,.tabs-bar,.alert{display:none!important}
  .main-area{margin:0!important}.page{padding:0!important}
  body{background:#fff!important}
  .card{border:none;box-shadow:none}
  .ps-pdf{border:1px solid #ccc;max-width:100%}
}

</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh">
    <div style="text-align:center;font-family:system-ui">
      <div style="font-size:44px;margin-bottom:14px">&#x1F69A;</div>
      <div style="font-weight:600;font-size:16px;color:#1a1a1a">Noon Fleet HRMS</div>
      <div style="font-size:13px;color:#888;margin-top:6px">
        Sign in with your registered email (admins)<br>or Employee ID + passport number (employees).
      </div>
    </div>
  </div>
</div>
<script>
/* ── Production bootstrap: talks to the real API (no browser mock) ── */
var _CFG = { empFields: [], payEarn: [], payDed: [] };

function auditLog(action) {
  try {
    if (window.S && S.token && action)
      fetch('/api/audit', { method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.token },
        body: JSON.stringify({ action: action }) });
  } catch (e) {}
}

function saveDB() {
  try {
    if (window.S && S.token)
      fetch('/api/config', { method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.token },
        body: JSON.stringify(_CFG) });
  } catch (e) {}
}

async function loadCfg() {
  try {
    const r = await fetch('/api/config', { headers: { 'Authorization': 'Bearer ' + S.token } });
    if (r.ok) { const c = await r.json();
      _CFG.empFields = c.empFields || []; _CFG.payEarn = c.payEarn || []; _CFG.payDed = c.payDed || []; }
  } catch (e) {}
}

function resetDB() {
  alert('This is the live system — records are stored in the central database with daily backups.\nContact the main admin for data corrections.');
}
</script>
<script>
/* ============================================================
   Noon Fleet HRMS — Frontend Application
   Edit this file to change behaviour.
   API base: all fetch() calls go to /api/...
   ============================================================ */

/* ─── Global State ─────────────────────────────────────────── */

/* ─── Utility Helpers ──────────────────────────────────────── */
function fmtDate(d) {
  if (!d) return '—';
  const p = String(d).split('T')[0].split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
}
function fmt(v)       { return v || '—'; }
function getInit(n)   { return (n || '').split(' ').slice(0, 2).map(x => x[0]).join('').toUpperCase(); }
function n2(v)        { return parseFloat(String(v || 0).replace(/,/g, '')) || 0; }
function aed(v)       { const x = n2(v); return 'AED ' + (x || 0).toLocaleString(); }
function isInProb(emp){ if (!emp || !emp.joiningDate) return false; return (new Date() - new Date(emp.joiningDate)) / 864e5 < 182; }

function calcAL(jd) {
  if (!jd) return { accrued: 0, months: 0 };
  const days = Math.max(0, (new Date() - new Date(jd)) / 864e5);
  const m    = Math.min(days / 30.44, 12);
  return { accrued: Math.floor((m / 12) * 26), months: Math.floor(m) };
}

function getLeaveBal(leaves, jd) {
  const app  = (leaves || []).filter(l => l.status === 'Approved');
  const alU  = app.filter(l => l.type === 'Annual Leave').reduce((s, l) => s + l.days, 0);
  const slFU = app.filter(l => l.type === 'Sick Leave (Full)').reduce((s, l) => s + l.days, 0);
  const slHU = app.filter(l => l.type === 'Sick Leave (Half Pay)').reduce((s, l) => s + l.days, 0);
  const slPU = app.filter(l => l.type === 'Sick Leave (Unpaid)').reduce((s, l) => s + l.days, 0);
  const al   = calcAL(jd);
  return {
    al: { total: al.accrued, used: alU, balance: Math.max(0, al.accrued - alU), months: al.months },
    sl: {
      full:   { total: 15, used: slFU, balance: Math.max(0, 15 - slFU) },
      half:   { total: 15, used: slHU, balance: Math.max(0, 15 - slHU) },
      unpaid: { total: 15, used: slPU, balance: Math.max(0, 15 - slPU) }
    }
  };
}

/* ─── API Wrapper ──────────────────────────────────────────── */
async function api(method, path, data, isFormData) {
  const opts = { method, headers: {} };
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token;
  if (data && !isFormData) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(data);
  } else if (isFormData) {
    opts.body = data; // FormData sets its own content-type
  }
  const res  = await fetch(API + '/api' + path, opts);
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Request failed');
  return json;
}

async function loadData(force) {
  try {
    if (S.screen === 'admin') {
      if (!S.employees     || force) S.employees     = await api('GET', '/employees');
      if (!S.leaves        || force) S.leaves        = await api('GET', '/leaves');
      if (!S.payslips      || force) S.payslips      = await api('GET', '/payslips');
      if (!S.documents     || force) S.documents     = await api('GET', '/documents');
    } else if (S.screen === 'employee') {
      if (!S.leaves        || force) S.leaves        = await api('GET', '/leaves');
      if (!S.payslips      || force) S.payslips      = await api('GET', '/payslips');
      if (!S.notifications || force) S.notifications = await api('GET', '/notifications');
    }
  } catch (e) { console.error('loadData error:', e); }
}

/* ─── Auth ─────────────────────────────────────────────────── */
/* ─── OTP Admin Login ──────────────────────────────────────── */
async function requestOtp() {
  const email = (document.getElementById('admin-email')?.value || '').trim();
  if (!email) { S.loginErr = 'Please enter your email address'; R(); return; }
  S.otpEmail   = email;
  S.otpSending = true;
  S.loginErr   = '';
  R();
  try {
    const res = await api('POST', '/auth/admin/request-otp', { email });
    S.otpStep    = 'otp';
    S.otpSending = false;
    // In dev mode the OTP is returned in the response for testing
    if (res._devOtp) {
      S.loginErr = '';
      console.log('DEV MODE — OTP:', res._devOtp);
    }
    R();
    setTimeout(() => { document.getElementById('otp-input')?.focus(); }, 100);
  } catch (e) {
    S.loginErr   = e.message;
    S.otpSending = false;
    R();
  }
}

async function verifyOtp() {
  const otp = (document.getElementById('otp-input')?.value || '').trim();
  if (!otp) { S.loginErr = 'Please enter the code'; R(); return; }
  S.loginErr = '';
  try {
    const res = await api('POST', '/auth/admin/verify-otp', { email: S.otpEmail, otp });
    S.token = res.token;
    S.user  = res;
    localStorage.setItem('hrms_token', res.token);
    localStorage.setItem('hrms_user', JSON.stringify(res));
    await loadCfg();
    S.screen    = 'admin';
    S.nav       = 'dashboard';
    S.otpStep   = 'email';
    auditLog('Admin signed in: ' + res.email);
    S.otpEmail  = '';
    S.employees = S.leaves = S.payslips = S.notifications = S.documents = null;
    await loadData();
    R();
  } catch (e) {
    S.loginErr = e.message;
    R();
  }
}

/* ─── Employee Login ───────────────────────────────────────── */
async function doLogin() {
  S.loginErr = '';
  const id   = (document.getElementById('lid')?.value || '').trim();
  const pass = (document.getElementById('lpass')?.value || '').trim();
  try {
    const res = await api('POST', '/auth/employee/login', { empId: id, passportNo: pass });
    S.empOtpStep  = 'otp';
    S.empOtpId    = id;
    S.empOtpEmail = res.email || '';
    if (res._devOtp) console.log('DEV MODE — Employee OTP:', res._devOtp);
    R();
    setTimeout(() => { document.getElementById('emp-otp')?.focus(); }, 100);
  } catch (e) {
    S.loginErr = e.message;
    R();
  }
}

async function verifyEmpOtp() {
  const otp = (document.getElementById('emp-otp')?.value || '').trim();
  if (!otp) { S.loginErr = 'Please enter the code'; R(); return; }
  S.loginErr = '';
  try {
    const res = await api('POST', '/auth/employee/verify-otp', { empId: S.empOtpId, otp });
    S.token = res.token;
    S.user  = res;
    localStorage.setItem('hrms_token', res.token);
    localStorage.setItem('hrms_user', JSON.stringify(res));
    await loadCfg();
    S.screen = 'employee';
    S.empOtpStep = 'creds';
    S.employees = S.leaves = S.payslips = S.notifications = S.documents = null;
    await loadData();
    S.viewEmp = await api('GET', '/employees/' + res.empId);
    R();
  } catch (e) {
    S.loginErr = e.message;
    R();
  }
}

function doLogout() {
  S.token = ''; S.user = null; S.screen = 'login';
  S.employees = S.leaves = S.payslips = S.notifications = S.documents = null;
  localStorage.removeItem('hrms_token');
  localStorage.removeItem('hrms_user');
  R();
}

/* ─── Render Engine ────────────────────────────────────────── */
function R() {
  document.getElementById('root').innerHTML = render();
  bindEvents();
}

  if (S.screen === 'admin')    return renderAdmin();

/* ─── Dashboard ────────────────────────────────────────────── */
function renderDashboard() {
  const es     = S.employees || [];
  const active = es.filter(e => e.status === 'Active');
  const inact  = es.filter(e => e.status !== 'Active');
  const today  = new Date().toISOString().slice(0, 10);
  const onLeaveIds = {};
  (S.leaves || []).forEach(l => {
    if (l.status === 'Approved' && String(l.fromDate) <= today && today <= String(l.toDate)) onLeaveIds[l.employeeId] = 1;
  });
  const onLeave = active.filter(e => onLeaveIds[e.id]).length;
  const working = active.length - onLeave;
  const pend    = (S.leaves || []).filter(l => l.status === 'Pending').length;
  const cutoff  = new Date(Date.now() + 90 * 864e5).toISOString().slice(0, 10);
  const expir   = active.filter(e => e.evisaExpiry && e.evisaExpiry <= cutoff).length;
  const payTot  = m?.payslipsIssued || 0;
  const byPos = {};
  active.forEach(e => { const k = e.position || 'Other'; byPos[k] = (byPos[k] || 0) + 1; });
  const posRows = Object.entries(byPos).sort((a, b) => b[1] - a[1]);
  const maxPos  = posRows.length ? posRows[0][1] : 1;
  const pcL = onLeave / (es.length || 1) * 100, pcI = inact.length / (es.length || 1) * 100;
  const card = (icon, color, bg, lbl, val, key) => `
    <div class="stat" style="display:flex;align-items:center;gap:12px;cursor:pointer" onclick="viewDashMetric('${key}')">
      <div style="width:42px;height:42px;border-radius:11px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:20px;color:${color};flex-shrink:0"><i class="ti ${icon}"></i></div>
      <div><div class="lbl">${lbl}</div><div class="val" style="font-size:20px">${val}</div></div>
    </div>`;
  return `<div class="stats-row" style="grid-template-columns:repeat(auto-fit,minmax(195px,1fr))">
    ${card('ti-users','#185FA5','#E6F1FB','Total employees',es.length.toLocaleString(),'total_emp')}
    ${card('ti-user-check','var(--green)','var(--green-light)','Active &amp; working',working.toLocaleString(),'active_emp')}
    ${card('ti-beach','var(--amber)','#FAEEDA','On leave today',onLeave.toLocaleString(),'on_leave')}
    ${card('ti-user-off','var(--red)','#FCEBEB','Inactive',inact.length.toLocaleString(),'inactive')}
  </div>
  <div class="stats-row" style="grid-template-columns:repeat(auto-fit,minmax(195px,1fr))">
    ${card('ti-calendar-event','var(--amber)','#FAEEDA','Pending leave requests',pend,'pending_leaves')}
    ${card('ti-id-badge','var(--red)','#FCEBEB','Visas expiring ≤90 days',expir.toLocaleString(),'visa_expiring')}
    ${card('ti-cash','var(--green)','var(--green-light)','Monthly payroll',aed(payTot),'payroll')}
  </div>
  <div class="card"><div class="card-head"><h3>Workforce status</h3>
    <span style="font-size:11px;color:var(--muted)"><span style="color:var(--green)">●</span> Working &nbsp;<span style="color:var(--amber)">●</span> On leave &nbsp;<span style="color:var(--red)">●</span> Inactive</span></div>
  <div class="card-body" style="padding:1rem 1.25rem">
    <div style="display:flex;height:14px;border-radius:7px;overflow:hidden;background:#f0f0ee">
      <div style="width:${(100 - pcL - pcI).toFixed(1)}%;background:var(--green)"></div>
      <div style="width:${pcL.toFixed(1)}%;background:var(--amber)"></div>
      <div style="width:${pcI.toFixed(1)}%;background:var(--red)"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px">
      <span>${working.toLocaleString()} working</span><span>${onLeave.toLocaleString()} on leave</span><span>${inact.length.toLocaleString()} inactive</span>
    </div>
  </div></div>
  <div class="card"><div class="card-head"><h3>Headcount by position</h3>
    <span style="font-size:11px;color:var(--muted)">${posRows.length} positions · active staff only</span></div>
  <div class="card-body">${posRows.map(([pos, n]) => `
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${pos}</span><b>${n.toLocaleString()} <span style="color:var(--muted);font-weight:400">(${(n / active.length * 100).toFixed(1)}%)</span></b></div>
      <div class="leave-bar" style="height:8px"><div class="leave-fill" style="width:${Math.round(n / maxPos * 100)}%"></div></div>
    </div>`).join('')}
  </div></div>
  <div class="alert alert-i" style="margin-top:.25rem"><i class="ti ti-cloud-check"></i>
    <div><b>Data protection:</b> records are stored in the central database; documents and daily backups sync to Google Drive automatically.</div>
  </div>`;
}

/* ─── Settings: custom fields & payroll entities ───────────── */
function renderSettingsPage() {
  const list = (arr, kind, title, hint) => `<div class="card">
    <div class="card-head"><h3>${title}</h3><span style="font-size:11px;color:var(--muted)">${hint}</span></div>
    <div class="card-body">
      ${arr.length === 0 ? `<p style="color:var(--muted);font-size:12px;margin-bottom:8px">None added yet.</p>` : ''}
      ${arr.map((x, i) => `<div class="doc-item"><span style="font-size:13px"><i class="ti ti-tag" style="color:var(--muted)"></i> ${x.label || x}</span>
        <button class="btn sm" style="color:var(--red)" onclick="rmEntity('${kind}',${i})"><i class="ti ti-trash"></i></button></div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:10px">
        <input id="add-${kind}" placeholder="New name… e.g. ${kind==='emp'?'Insurance Number':kind==='earn'?'Ramadan Bonus':'Uniform Charges'}" style="flex:1"/>
        <button class="btn g" onclick="addEntity('${kind}')"><i class="ti ti-plus"></i> Add</button>
      </div>
    </div></div>`;
  return `<div class="alert alert-i"><i class="ti ti-info-circle"></i><div>Entities added here appear automatically in employee profiles &amp; edit forms, in the import/export templates, and on payslips. Removing one hides it but does not delete saved data.</div></div>
  ${list(CFG.empFields, 'emp', 'Employee profile — custom fields', 'shown on profile + edit form + templates')}
  ${list(CFG.payEarn, 'earn', 'Payroll — extra EARNING entities', 'added to payroll template + payslip earnings')}
  ${list(CFG.payDed, 'ded', 'Payroll — extra DEDUCTION entities', 'added to payroll template + payslip deductions')}`;
}
function addEntity(kind) {
  const v = (document.getElementById('add-' + kind)?.value || '').trim();
  if (!v) return;
  if (kind === 'emp') CFG.empFields.push({ key: v.toLowerCase().replace(/[^a-z0-9]+/g, '_'), label: v });
  else if (kind === 'earn') CFG.payEarn.push(v);
  else CFG.payDed.push(v);
  saveDB(); auditLog('Added ' + (kind === 'emp' ? 'employee custom field' : 'payroll entity') + ': ' + v); R();
}
function rmEntity(kind, i) {
  const arr = kind === 'emp' ? CFG.empFields : kind === 'earn' ? CFG.payEarn : CFG.payDed;
  auditLog('Removed ' + (kind === 'emp' ? 'employee custom field' : 'payroll entity') + ': ' + (arr[i].label || arr[i]));
  arr.splice(i, 1); saveDB(); R();
}

/* ─── Dashboard Metrics Viewer ───────────────────────── */
async function viewDashMetric(key) {

function renderDashMetricModal() {
  const m = S.dashMetric || {}; if (!m.key) return '';
  const metrics = m.metrics || {};
  const allEmps = [...(metrics.details?.activeAndWorking || []), ...(metrics.details?.onLeave || []), ...(metrics.details?.inactive || [])];
  const details = {
    total_emp: { title: 'All employees', list: allEmps },
    active_emp: { title: 'Active & working', list: metrics.details?.activeAndWorking || [] },
    on_leave: { title: 'On leave today', list: metrics.details?.onLeave || [] },
    inactive: { title: 'Inactive', list: metrics.details?.inactive || [] },
    pending_leaves: { title: 'Pending leave requests', list: metrics.details?.pendingLeavesList || [] },
    visa_expiring: { title: 'Visas expiring ≤90 days', list: metrics.details?.visasExpiringList || [] },
    payroll: { title: 'Monthly payroll total', total: metrics.totalPayroll }
  };
  const d = details[m.key] || {};
  const listHTML = d.list && d.list.length ? d.list.map((item, i) => {
    if (m.key === 'on_leave') return `<tr><td>${item.empId}</td><td>${item.name}</td><td>${item.leaveType}</td><td>${fmtDate(item.fromDate)} → ${fmtDate(item.toDate)}</td></tr>`;
    if (m.key === 'inactive' || m.key === 'active_emp') return `<tr><td>${item.empId}</td><td>${item.name}</td></tr>`;
    if (m.key === 'visa_expiring') return `<tr><td>${item.empId}</td><td>${item.name}</td><td>${fmtDate(item.expiryDate)}</td><td>${item.daysLeft} days</td></tr>`;
    if (m.key === 'pending_leaves') return `<tr><td>${item.empId}</td><td>${item.name}</td><td>${item.type}</td><td>${fmtDate(item.fromDate)}</td><td>${item.days}d</td><td>${fmtDate(item.appliedOn)}</td></tr>`;
    return '';
  }).join('') : '<tr><td colspan="10" style="text-align:center;padding:1rem;color:var(--muted)">None</td></tr>';

  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()" style="max-width:700px">
    <div class="modal-head"><h3>${d.title}</h3><button class="close-btn" onclick="openModal(null)"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      ${d.total ? `<p style="font-size:16px"><b>Total:</b> <span style="color:var(--green);font-weight:600">${aed(d.total)}</span></p>` : ''}
      ${d.list && d.list.length ? `<div class="tbl-wrap"><table><thead><tr>
        ${m.key === 'on_leave' ? '<th>ID</th><th>Name</th><th>Leave type</th><th>Dates</th>' : ''}
        ${m.key === 'inactive' || m.key === 'active_emp' ? '<th>ID</th><th>Name</th>' : ''}
        ${m.key === 'visa_expiring' ? '<th>ID</th><th>Name</th><th>Expiry</th><th>Days left</th>' : ''}
        ${m.key === 'pending_leaves' ? '<th>ID</th><th>Name</th><th>Type</th><th>From</th><th>Days</th><th>Applied</th>' : ''}
      </tr></thead><tbody>${listHTML}</tbody></table></div>` : '<p style="text-align:center;color:var(--muted);padding:1rem">No data</p>'}
    </div>
    <div class="modal-foot"><button class="btn" onclick="openModal(null)">Close</button></div>
  </div></div>`;
}

/* ─── Data Export (offline workflow) ───────────────────────── */
function dlCurrentData(fmt0) {
  const ECOLS = EMP_COLS.concat(CFG.empFields.map(f => ({ k: 'cf_' + f.key, l: f.label, r: false })));
  const rows = (S.employees || []).map(e => ECOLS.map(c => e[c.k] !== undefined ? e[c.k] : ''));
  const stamp = new Date().toISOString().slice(0, 10);
  if (fmt0 === 'xlsx' && window.XLSX) {
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([ECOLS.map(c => c.l), ...rows]);
    ws['!cols'] = ECOLS.map(() => ({ wch: 18 }));
    XLSX.utils.book_append_sheet(wb, ws, 'Employees');
    XLSX.writeFile(wb, `NoonFleet_Employees_${stamp}.xlsx`);
  } else {
    const csv = [ECOLS.map(c => c.l), ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = `NoonFleet_Employees_${stamp}.csv`;
    a.click();
  }
  auditLog(`Exported full employee data (${(S.employees||[]).length} records, ${fmt0.toUpperCase()})`);
}

/* ─── Employee List ────────────────────────────────────────── */
function renderEmpList() {
  const t0 = performance.now();
  const q  = (S.search || '').toLowerCase();
  const all = (S.employees || []).filter(e =>
    !q ||
    e.name.toLowerCase().includes(q) ||
    e.empId.toLowerCase().includes(q) ||
    (e.passportNo || '').toLowerCase().includes(q) ||
    (e.position || '').toLowerCase().includes(q) ||
    (e.location || '').toLowerCase().includes(q)
  );
  const PER = 25;
  const pages = Math.max(1, Math.ceil(all.length / PER));
  if (S.empPage === undefined || S.empPage >= pages) S.empPage = 0;
  const emps = all.slice(S.empPage * PER, S.empPage * PER + PER);
  const ms = (performance.now() - t0).toFixed(1);
  return `<div class="card">
    <div class="card-head">
      <h3>${all.length.toLocaleString()} employee${all.length !== 1 ? 's' : ''} <span style="font-weight:400;color:var(--muted);font-size:11px">· searched in ${ms} ms</span></h3>
      <div style="display:flex;gap:7px">
        ${(S.user?.isSuperAdmin || (S.user?.permissions||[]).includes('export_data')) ? `<button class="btn" onclick="dlCurrentData('xlsx')"><i class="ti ti-download"></i> Export Excel</button>
        <button class="btn" onclick="dlCurrentData('csv')"><i class="ti ti-download"></i> CSV</button>` : ''}
        <button class="btn b" onclick="setNav('import');S.importTab='employees';R()">
          <i class="ti ti-file-upload"></i> Bulk Import
        </button>
      </div>
    </div>
    <div class="tbl-wrap"><table><thead><tr>
      <th style="width:27%">Name</th><th style="width:12%">ID</th><th style="width:13%">Passport</th>
      <th style="width:15%">Position</th><th style="width:11%">Collar</th><th style="width:10%">Status</th>
      <th style="width:12%"></th>
    </tr></thead>
    <tbody>${emps.length === 0

function renderImport() {

function stepsBar(current, labels) {
  return `<div class="import-steps">
    ${labels.map((lbl, i) => {
      const n = i + 1;
      const cls = current === n ? 'active' : current > n ? 'done' : '';
      return `<div class="imp-step ${cls}">
        <div class="imp-step-num">${current > n ? '<i class="ti ti-check" style="font-size:9px"></i>' : n}</div>
        <div class="imp-step-lbl">${lbl}</div>
      </div>`;
    }).join('')}
  </div>`;
}

      <div class="card-head"><h3>Validation — ${rows.length} rows · nothing is applied until you confirm</h3>

/* ─── Documents Page ───────────────────────────────────────── */
async function bulkDocUpload(files) {
  if (!files || !files.length) return;
  let okN = 0; const miss = [];
  for (const f of [...files]) {
    const m = f.name.match(/^([A-Za-z]{2}\d+)/);
    const emp = m ? (S.employees || []).find(e => e.empId.toUpperCase() === m[1].toUpperCase()) : null;
    if (emp) {
      const fd = new FormData();
      fd.append('employeeId', emp.id);
      fd.append('name', f.name);
      fd.append('type', 'Bulk upload');
      fd.append('file', f);
      try { await api('POST', '/documents', fd, true); okN++; }
      catch (e) { miss.push(f.name + ' — ' + e.message); }
    } else miss.push(f.name);
  }
  S.documents = await api('GET', '/documents');
  alert(`✓ ${okN} document(s) uploaded (matched by Employee ID prefix).${miss.length ? `\n✗ Unmatched / failed:\n` + miss.join('\n') : ''}`);
  R();
}

        <button class="btn g" onclick="openModal('uploadDoc')"><i class="ti ti-upload"></i> Upload</button>` : ''}

/* ─── Employee Detail (admin) ──────────────────────────────── */
function renderEmpDetail() {
  const e = S.viewEmp;
  if (!e) return '';
  const myLeaves   = (S.leaves    || []).filter(l => l.employeeId === e.id);
  const myPayslips = (S.payslips  || []).filter(p => p.employeeId === e.id);
  const myDocs     = (S.documents || []).filter(d => d.employeeId === e.id);
  const bal  = getLeaveBal(myLeaves, e.joiningDate);
  const prob = isInProb(e);
  const tab  = S.profileTab;

  return `<div class="profile-header">
    <div class="avatar lg" style="${e.status==='Inactive'?'opacity:0.4':''}">${getInit(e.name)}</div>
    <div style="flex:1">
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">${e.name}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">
        <span class="badge ${e.status==='Active'?'bg':e.status==='Inactive'?'br':'bgr'}">${e.status}</span>
        ${prob ? `<span class="badge ba">Probation (${Math.ceil((182-(new Date()-new Date(e.joiningDate))/864e5)/7)}w left)</span>` : ''}
        <span class="badge ${e.collar==='Blue collar'?'bb':'ba'}">${e.collar}</span>
        <span class="badge bgr">${e.position}</span>
      </div>
      <div class="profile-meta">
        <span><i class="ti ti-id-badge"></i> ${e.empId}</span>
        <span><i class="ti ti-map-pin"></i> ${e.location}</span>
        <span><i class="ti ti-mail"></i> ${e.email}</span>
      </div>
    </div>
  </div>
  ${e.status==='Inactive' ? `<div class="alert alert-e"><i class="ti ti-user-off"></i>Employee is inactive — cannot log in or apply for leaves.</div>` : ''}
  ${prob && e.status==='Active' ? `<div class="probation-bar"><i class="ti ti-clock"></i>On probation — leave applications restricted until 6 months from ${fmtDate(e.joiningDate)}.</div>` : ''}
  <div class="tabs-bar">
    ${[['personal','Personal'],['passport','Visa'],['employment','Employment'],['leaves','Leave'],['payslips','Payslips'],['documents','Documents']]
      .map(([k, l]) => `<div class="tab-btn ${tab===k?'active':''}" onclick="S.profileTab='${k}';R()">${l}</div>`).join('')}
  </div>
  ${tab==='personal'    ? renderPersonalTab(e) : ''}
  ${tab==='passport'    ? renderPassportTab(e) : ''}
  ${tab==='employment'  ? renderEmploymentTab(e) : ''}
  ${tab==='leaves'      ? renderLeavesTab(e, myLeaves, bal, true) : ''}
  ${tab==='payslips'    ? renderPayslipsTab(myPayslips) : ''}
  ${tab==='documents'   ? renderDocumentsTab(myDocs, e.id, true) : ''}`;
}

/* ─── Payslip Renderer ─────────────────────────────────────── */
function renderPsCard(psOrData) {
  const r     = psOrData?.data || psOrData;
  if (!r) return '';
  const month  = psOrData.month || r.month || 'Pay Period';
  const orders = r['Total Orders Delivered'] || '0';
  const gross  = r['Gross Salary'] || 0;
  const totDed = r['Total Deductions'] || 0;
  const netPay = r['Employee Net Pay'] || r.net || 0;

  const earnings = [
    ['Arrears', r['Arrears']], ['Food Allowance', r['Food Allowance']],
    ['Referral Bonus', r['Referral Bonus']], ['Joining Bonus', r['Joining Bonus']],
    ['Tips', r['Tips']], ['NIM Bonus / Incentives', r['NIM Bonus / Incentives']],
    ['Supermall Incentives', r['Supermall Incentives']], ['Noon Food Incentives', r['Noon Food Incentives']],
    [`Order Earnings (${orders})`, r['Order Earnings']]
  ].concat(CFG.payEarn.map(nm => [nm, r[nm]])).filter(([, v]) => n2(v) > 0);

  const deds = [
    ['Order Rejections', r['Rejections']], ['Driver License Loan', r['Driver License Loan']],
    ['Accommodation Charges', r['Accommodation Charges']], ['Salary Advances', r['Salary Advances']],
    ['COD Deductions', r['COD Deductions']], ['Salik (Road Tolls)', r['Salik (Road Tolls)']],
    ['Traffic Fines', r['Traffic Fines']], ['Camp Misuse Fine', r['Camp Misuse Fine']],
    ['ILOE Deduction', r['ILOE Deduction']], ['Unpaid Sick Leaves', r['Unpaid Sick Leaves']],
    ['Unpaid Leaves', r['Unpaid Leaves']], ['Unapproved Absence Penalty', r['Unapproved Absence Penalty']],
    ['Disciplinary Deductions', r['Disciplinary Deductions']],
    ['Emirates ID Replacement', r['Emirates ID Replacement Cost']],
    ['ITC Permit', r['ITC Permit']], ['Carried Over', r['Carried Over'] || 0]
  ].concat(CFG.payDed.map(nm => [nm, r[nm]])).filter(([, v]) => n2(v) > 0);

  const cfRows = [
    ['Order Rejections', r['CF Rejections']], ['Driver License Loan', r['CF Driver License Loan']],
    ['Accommodation', r['CF Accommodation Charges']], ['Salary Advances', r['CF Salary Advances']],
    ['COD', r['CF COD Deductions']], ['Salik', r['CF Salik']],
    ['Traffic Fines', r['CF Traffic Fines']], ['Camp Misuse', r['CF Camp Misuse Fine']],
    ['ILOE', r['CF ILOE Deduction']], ['Unpaid Sick', r['CF Unpaid Sick Leaves']],
    ['Unpaid Leaves', r['CF Unpaid Leaves']], ['Unapproved Absence', r['CF Unapproved Absence']],
    ['Disciplinary', r['CF Disciplinary Deductions']], ['ITC Permit', r['CF ITC permit']],
    ['Other', r['CF Other deductions']]
  ].filter(([, v]) => n2(v) > 0);

  return `<div class="ps-pdf">
    <div class="ps-head">
      <img src="${LOGO}" alt="Noon Fleet" style="height:38px;width:auto;margin-bottom:6px"/>
      <div class="ps-period">Pay Period: ${month}</div>
    </div>
    <div class="ps-info-row">
      <div class="ps-info-left">
        <b>Employee ID:</b> ${r['Employee ID']||'—'}<br>
        <b>Name:</b> ${r['Employee Name']||'—'}<br>
        <b>Date Of Joining:</b> ${r['Date of Joining']||'—'}<br>
        <b>Date Of Deployment:</b> ${r['Date of Deployment']||'—'}<br>
        <b>Department:</b> ${r['department']||'—'}<br>
        <b>Designation:</b> ${r['Designation']||'—'}<br>
        <b>Total Orders Delivered:</b> ${orders}<br>
        <b>Bike Number:</b> ${r['Rider ID']||'—'}
      </div>
      <div class="ps-info-right">
        <div style="font-size:13px;font-weight:700">NET PAY</div>
        <div style="font-size:26px;font-weight:700;color:#378ADD">${aed(netPay)}</div>
      </div>
    </div>
    <div class="ps-body">
      <div>
        <div class="ps-col-title">A) Earnings</div>
        ${earnings.length === 0
          ? `<div class="ps-line"><span>No earnings</span><span>AED 0</span></div>`
          : earnings.map(([l, v]) => `<div class="ps-line"><span>${l}</span><span>${aed(v)}</span></div>`).join('')}
        <div class="ps-line total"><span>Gross Salary</span><span>${aed(gross)}</span></div>
      </div>
      <div class="ps-col-right">
        <div class="ps-col-title">B) Deductions</div>
        ${deds.length === 0
          ? `<div class="ps-line"><span>No deductions</span><span>AED 0</span></div>`
          : deds.map(([l, v]) => `<div class="ps-line"><span>${l}</span><span>${aed(v)}</span></div>`).join('')}
        <div class="ps-line total"><span>Total Deductions</span><span>${aed(totDed)}</span></div>
      </div>
    </div>
    <div class="ps-summary">
      <div style="font-size:12px;font-weight:700;margin-bottom:6px">Net Summary</div>
      <div class="ps-sum-line"><span>Total deduction to deduct in ${month}</span><span>${aed(r['The total deduction we had to deduct in (Current month)']||totDed)}</span></div>
      <div class="ps-sum-line"><span>Total deduction actually deducted</span><span>${aed(r['The total deduction we actually deducted in (Current month)']||totDed)}</span></div>
      <div class="ps-sum-line"><span>Balance carried forward</span><span>${aed(r['Balance Deduction Carried Forward']||0)}</span></div>
      <div class="ps-sum-line final"><span>Final Payout</span><span>${aed(netPay)}</span></div>
    </div>
    ${cfRows.length > 0 ? `
      <div class="ps-cf">
        <div class="ps-cf-title">Deductions Carry Forwarded — Break-up</div>
        ${cfRows.map(([l, v]) => `<div class="ps-cf-line"><span>${l}</span><span>${aed(v)}</span></div>`).join('')}
        <div class="ps-cf-line" style="font-weight:700"><span>Total</span><span>${aed(r['Balance Deduction Carried Forward']||0)}</span></div>
      </div>` : ''}
    <div class="ps-note">Note: Fines and Salik may be reflected in future pay cycles.<br>
      Starting Jan Cycle any Approved leave will be paid as per your MOL contract.<br>
      Regards, Fleetco Payroll Team
    </div>
  </div>`;
}

/* ─── Employee Portal ──────────────────────────────────────── */
function renderEmpPortal() {
  const tab        = S.profileTab;
  const meId       = S.viewEmp?.id;
  const myLeaves   = (S.leaves        || []).filter(l => l.employeeId === meId);
  const myPayslips = (S.payslips      || []).filter(p => p.employeeId === meId);
  const myDocs     = (S.documents     || []).filter(d => d.employeeId === meId);
  const myNotifs   = (S.notifications || []).filter(n => n.employeeId === meId);
  const unread     = myNotifs.filter(n => !n.isRead).length;
  const emp        = S.viewEmp;
  const prob       = emp ? isInProb(emp) : false;
  const bal        = getLeaveBal(myLeaves, emp?.joiningDate);

  const navs = [
    ['profile',       'ti-user',          'My Profile'],
    ['leaves',        'ti-calendar-event','My Leaves'],
    ['payroll',       'ti-cash',          'My Payslips'],
    ['documents',     'ti-folder',        'My Documents'],
    ['notifications', 'ti-bell',          'Notifications']
  ];

  let content = '';
  if      (tab === 'profile')       content = renderEmpSelfProfile(emp, prob);
  else if (tab === 'leaves')        content = renderEmpLeavesTab(emp, myLeaves, bal, prob);
  else if (tab === 'payroll')       content = renderEmpPayslipsTab(myPayslips);
  else if (tab === 'documents')     content = renderEmpDocsTab(myDocs);
  else if (tab === 'notifications') content = renderNotifsTab(myNotifs);

  return `<div class="app-layout">
    ${S.sideOpen ? `<div class="sidebar-overlay show" onclick="S.sideOpen=false;R()"></div>` : ''}

function renderEmpLeavesTab(emp, leaves, bal, prob) {
  if (!emp) return `<div class="loading"><i class="ti ti-loader"></i>Loading…</div>`;
  const al  = bal.al; const sl = bal.sl;
  const pct = v => Math.min(100, Math.round((v.used / Math.max(v.total, 1)) * 100));
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem">
    <div class="ltcard" style="grid-column:1/-1">
      <h4>Annual Leave · ${al.months} months service</h4>
      <div class="lt-meta"><span>${al.total} accrued of 26</span><span>${al.used} used · <b>${al.balance} remaining</b></span></div>
      <div class="leave-bar"><div class="leave-fill ${pct(al)>80?'amber':''}" style="width:${pct(al)}%"></div></div>
    </div>
    <div class="ltcard"><h4>Sick Full pay (15)</h4>
      <div class="lt-meta"><span></span><span><b>${sl.full.balance} left</b></span></div>
      <div class="leave-bar"><div class="leave-fill" style="width:${pct(sl.full)}%"></div></div>
    </div>
    <div class="ltcard"><h4>Sick Half pay (15)</h4>
      <div class="lt-meta"><span></span><span><b>${sl.half.balance} left</b></span></div>
      <div class="leave-bar"><div class="leave-fill amber" style="width:${pct(sl.half)}%"></div></div>
    </div>
  </div>
  ${prob ? `<div class="probation-bar"><i class="ti ti-lock"></i>Leave applications are locked during your 6-month probation period.</div>` : ''}
  <div class="card"><div class="card-head"><h3>My leave history</h3>
    ${!prob && emp.status !== 'Inactive' ? `<button class="btn g" onclick="openModal('applyLeave')"><i class="ti ti-plus"></i> Apply for leave</button>` : ''}
  </div>
  <div class="tbl-wrap"><table style="table-layout:fixed"><thead><tr>
    <th style="width:22%">Type</th><th style="width:12%">From</th><th style="width:12%">To</th>
    <th style="width:7%">Days</th><th style="width:17%">Reason</th><th style="width:10%">Cert.</th>
    <th style="width:12%">Status</th>
  </tr></thead>
  <tbody>${leaves.length === 0
    ? `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted)">No leaves yet</td></tr>`
    : leaves.map(l => `<tr>
        <td style="white-space:normal;font-size:11px">${l.type}</td>
        <td>${fmtDate(l.fromDate)}</td><td>${fmtDate(l.toDate)}</td><td>${l.days}</td>
        <td style="white-space:normal;font-size:11px">${l.reason||'—'}</td>
        <td>${l.certificate
          ? `<span class="badge bg" style="font-size:9px"><i class="ti ti-paperclip"></i> Yes</span>`
          : l.type.startsWith('Sick') ? `<span class="badge br" style="font-size:9px">Missing</span>` : '—'}</td>
        <td><span class="badge ${l.status==='Approved'?'bg':l.status==='Rejected'?'br':'ba'}">${l.status}</span></td>
      </tr>`).join('')}
  </tbody></table></div></div>`;
}

async function markAllRead() {
  await api('PATCH', '/notifications/read-all');
  S.notifications = await api('GET', '/notifications');
  R();
}
function renderNotifsTab(notifs) {
  if (!notifs.length) return `<div style="text-align:center;padding:3rem;color:var(--muted)"><i class="ti ti-bell-off" style="font-size:32px;display:block;margin-bottom:1rem"></i>No notifications</div>`;
  const unread = notifs.filter(n => !n.isRead).length;
  return `<div>${unread > 0 ? `<div style="display:flex;justify-content:flex-end;margin-bottom:.75rem"><button class="btn sm" onclick="markAllRead()"><i class="ti ti-checks"></i> Mark all ${unread} as read</button></div>` : ''}${notifs.map(n => `<div class="notif-item ${n.type==='approved'?'na':n.type==='rejected'?'nr':'np'}">
    <i class="ti ${n.type==='approved'?'ti-check':'ti-bell'}" style="color:${n.type==='approved'?'var(--green)':n.type==='rejected'?'var(--red)':'var(--amber)'}"></i>
    <div>
      <b>${n.title}</b><br>
      <span style="font-size:12px;color:var(--muted)">${n.message}</span><br>
      <span style="font-size:10px;color:var(--faint)">${fmtDate(n.createdAt)}</span>
    </div>
  </div>`).join('')}</div>`;
}

function renderModal() {
  const m = S.modal;
  if (m === 'addEmp')                           return renderAddEmpModal();
  if (m === 'editEmp')                          return renderEditEmpModal();
  if (m === 'applyLeave')                       return renderLeaveModal();
  if (m === 'uploadDoc' || m === 'uploadDocEmp' || m === 'uploadDocSelf') return renderDocModal();
  if (m === 'addAdmin')                         return renderAddAdminModal();
  if (m === 'deleteEmp')                        return renderDeleteEmpModal();
  if (m === 'viewCert')                         return renderCertModal();
  if (m === 'dashmetric')                       return renderDashMetricModal();
  return '';
}

async function submitLeave() {
  const type = gv('lt'), fromDate = gv('lf'), toDate = gv('lt2'), reason = gv('lr');
  if (!fromDate || !toDate) { alert('Please select dates'); return; }
  if (type.startsWith('Sick') && !document.getElementById('certfile')?.files[0]) {
    alert('Please upload a medical certificate for sick leave.'); return;
  }
  const days = Math.max(1, Math.floor((new Date(toDate) - new Date(fromDate)) / 864e5) + 1);
  try {
    const certF = document.getElementById('certfile')?.files[0];
    const res = await api('POST', '/leaves', {
      type, fromDate, toDate, days, reason,
      employeeId: S.viewEmp?.id,
      certificate: !!certF,
      certificateName: certF ? certF.name : ''
    });
    if (certF) {
      const cfd = new FormData();
      cfd.append('name', certF.name);
      cfd.append('type', 'Leave Certificate');
      cfd.append('file', certF);
      try { await api('POST', '/documents', cfd, true); } catch (e) {}
    }
    S.leaves = await api('GET', '/leaves');
    S.notifications = await api('GET', '/notifications');
    S.documents = await api('GET', '/documents');
    S.modal  = null;
    alert(`✓ Leave submitted!\nConfirmation email sent to: ${res.emailSentTo || 'your email'}`);
    R();
  } catch (e) { alert('Error: ' + e.message); }
}

/* ─── File Parsing ─────────────────────────────────────────── */
function parseFile(file, onRaw) {
  const isXls = file.name.match(/\.xlsx?$/i);
  const reader = new FileReader();
  if (isXls) {
    reader.onload = e => {
      const wb  = XLSX.read(e.target.result, { type: 'array' });
      onRaw(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' }));
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload = e => {
      const sep = e.target.result.includes('\t') ? '\t' : ',';
      onRaw(e.target.result.split('\n').filter(l => l.trim())
        .map(l => l.split(sep).map(v => v.replace(/^"|"$/g, '').trim())));
    };
    reader.readAsText(file);
  }
}

function handleEmpFile(file) {
  if (!file) return;
  const fb = document.getElementById('emp-fb');
  if (fb) fb.innerHTML = `<div class="alert alert-i"><i class="ti ti-loader"></i> Reading ${file.name}…</div>`;
  parseFile(file, raw => {
    if (!raw || raw.length < 2) {
      if (fb) fb.innerHTML = `<div class="alert alert-e">File empty or unreadable</div>`;
      return;
    }
    const hdr    = raw[0].map(h => String(h || '').trim());
    const COLS   = EMP_COLS.concat(CFG.empFields.map(f => ({ k: 'cf_' + f.key, l: f.label, r: false })));
    const colMap = {};
    COLS.forEach(c => {
      const i = hdr.findIndex(h => h === c.l || h === c.k);
      if (i >= 0) colMap[c.k] = i;
    });
    if (!Object.keys(colMap).length) {
      if (fb) fb.innerHTML = `<div class="alert alert-e">Could not match columns. Use the Noon Fleet employee template.</div>`;
      return;
    }
    const rows = [];
    for (let i = 1; i < raw.length; i++) {
      if (raw[i].every(c => !c)) continue;
      const obj = { _row: i + 1 };
      COLS.forEach(c => {
        const idx = colMap[c.k];
        obj[c.k]  = idx !== undefined ? String(raw[i][idx] || '').trim() : '';
      });
      const errs = [];
      EMP_REQ.forEach(k => { if (!obj[k]) errs.push(`${EMP_COLS.find(c => c.k === k)?.l || k} required`); });
      if (obj.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(obj.email)) errs.push('Invalid email');
      if (obj.gender && !['Male', 'Female'].includes(obj.gender)) errs.push('Gender: Male or Female');
      obj._errs = errs;
      obj._isUpdate = !!(obj.empId && (S.employees || []).some(e => e.empId === obj.empId));
      rows.push(obj);
    }
    S.empImportRows = rows;
    setTimeout(() => { S.empImportStep = 3; R(); }, 300);
  });
}

];

function renderAdminsPage() {
  const admins = S.adminsList || [];
  return `<div class="card">
    <div class="card-head"><h3>${admins.length} admin account${admins.length!==1?'s':''}</h3></div>
    <div class="tbl-wrap"><table><thead><tr>
      <th style="width:20%">Name</th><th style="width:25%">Email</th>
      <th style="width:10%">Type</th><th style="width:35%">Permissions</th><th style="width:10%"></th>
    </tr></thead>
    <tbody>${admins.length===0
      ? `<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--muted)">No admins yet</td></tr>`
      : admins.map(a => `<tr>
          <td>${a.name}</td>
          <td style="font-size:12px">${a.email||'—'}</td>
          <td>${a.isSuperAdmin
            ? `<span class="badge bg">Super</span>`
            : `<span class="badge bb">Limited</span>`}</td>
          <td style="white-space:normal;font-size:11px">
            ${a.isSuperAdmin
              ? '<span style="color:var(--muted)">All permissions</span>'
              : (a.permissions||[]).length===0
                ? '<span style="color:var(--muted)">View only (no permissions)</span>'
                : a.permissions.map(p => {
                    const found = ALL_PERMISSIONS.find(x=>x[0]===p);
                    return `<span class="badge bgr" style="margin:1px;font-size:10px">${found?found[1]:p}</span>`;
                  }).join('')}
          </td>
          <td><div style="display:flex;gap:4px">
            ${!a.isSuperAdmin ? `
              <button class="btn sm" onclick="editAdmin('${a.id}')"><i class="ti ti-edit"></i></button>
              <button class="btn sm r" onclick="deleteAdmin('${a.id}','${a.name}')"><i class="ti ti-trash"></i></button>
            ` : ''}
          </div></td>
        </tr>`).join('')}
    </tbody></table></div>
  </div>`;
}

function renderAddAdminModal() {
  const editing = S.editingAdmin;
  const perms   = editing?.permissions || [];
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>${editing ? 'Edit Admin — '+editing.name : 'Add New Admin'}</h3>
      <button class="close-btn" onclick="openModal(null)"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label>Full Name</label><input id="adm-name" value="${editing?.name||''}" placeholder="e.g. Sara Malik"/></div>
        <div class="field"><label>Email Address</label><input id="adm-email" type="email" value="${editing?.email||''}" placeholder="sara@noon.com"/></div>
      </div>
      <div class="section-label" style="margin-top:1rem">Permissions</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:.875rem">Select what this admin can do. Leave all unchecked for view-only access.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${ALL_PERMISSIONS.map(([key, label]) => `
          <label style="display:flex;align-items:center;gap:8px;background:#fafaf8;border:1px solid var(--border);border-radius:7px;padding:8px 10px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="perm-${key}" ${(perms.includes(key))?'checked':''} style="accent-color:var(--green)"/>
            ${label}
          </label>`).join('')}
      </div>
      <div class="alert alert-i" style="margin-top:1rem">
        <i class="ti ti-mail"></i>An invitation email will be sent to the admin with login instructions.
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="openModal(null)">Cancel</button>
      <button class="btn g" onclick="${editing ? 'saveEditAdmin()' : 'saveNewAdmin()'}">
        ${editing ? 'Save changes' : 'Create admin & send invite'}
      </button>
    </div>
  </div></div>`;
}

async function loadAdmins() {
  try { S.adminsList = await api('GET', '/admins'); R(); }
  catch(e) { console.error('Failed to load admins:', e.message); }
}

function editAdmin(id) {
  S.editingAdmin = S.adminsList.find(a => a.id === id);
  openModal('addAdmin');
}

async function deleteAdmin(id, name) {
  if (!confirm('Remove admin access for ' + name + '?')) return;
  try {
    await api('DELETE', '/admins/' + id);
    await loadAdmins();
  } catch(e) { alert('Error: ' + e.message); }
}

function getCheckedPerms() {
  return ALL_PERMISSIONS.map(([key]) => key).filter(key => document.getElementById('perm-'+key)?.checked);
}

async function saveNewAdmin() {
  const name  = (document.getElementById('adm-name')?.value||'').trim();
  const email = (document.getElementById('adm-email')?.value||'').trim();
  const permissions = getCheckedPerms();
  if (!name||!email) { alert('Name and email are required'); return; }
  try {
    await api('POST', '/admins', { name, email, permissions });
    S.modal = null; S.editingAdmin = null;
    auditLog(`Created limited admin ${email} [${permissions.join(', ')||'view-only'}]`);
    await loadAdmins();
    alert('✓ Admin created! Invitation email sent to ' + email);
  } catch(e) { alert('Error: ' + e.message); }
}

async function saveEditAdmin() {
  const id    = S.editingAdmin.id;
  const name  = (document.getElementById('adm-name')?.value||'').trim();
  const email = (document.getElementById('adm-email')?.value||'').trim();
  const permissions = getCheckedPerms();
  try {
    await api('PUT', '/admins/' + id, { name, email, permissions });
    S.modal = null; S.editingAdmin = null;
    await loadAdmins();
  } catch(e) { alert('Error: ' + e.message); }
}

/* ─── Event Binding & Init ─────────────────────────────────── */
function bindEvents() {
  document.getElementById('lid')?.addEventListener('keydown',   e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('lpass')?.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('admin-email')?.addEventListener('keydown', e => { if (e.key === 'Enter') requestOtp(); });
  document.getElementById('otp-input')?.addEventListener('keydown',   e => { if (e.key === 'Enter') verifyOtp(); });
  // Auto-verify when 6 digits entered
  document.getElementById('otp-input')?.addEventListener('input', e => {
    if (e.target.value.replace(/\D/g,'').length === 6) verifyOtp();
  });
  document.getElementById('emp-otp')?.addEventListener('keydown', e => { if (e.key === 'Enter') verifyEmpOtp(); });
  document.getElementById('emp-otp')?.addEventListener('input', e => {
    if (e.target.value.replace(/\D/g,'').length === 6) verifyEmpOtp();
  });
  if (document.getElementById('lt')) toggleCertField();
}

async function init() {
  if (S.token && S.user) {
    try {
      S.screen = S.user.role === 'admin' ? 'admin' : 'employee';
      await loadCfg();
      await loadData();
      if (S.screen === 'employee') {
        S.viewEmp = await api('GET', '/employees/' + (S.user.empId || ''));
      }
    } catch (e) {
      // Token expired — force re-login
      S.token = ''; S.user = null; S.screen = 'login';
      localStorage.removeItem('hrms_token');
      localStorage.removeItem('hrms_user');
    }
  }
  R();
}

init();

</script>
</body>
</html>
