    ['Other: ' + assetStatuses('other').join(', ')],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(info), 'Read me');
  const examples = {
    bike:  [['BIKE100', 'DXB A 12345', 'MLHJC9215...', 'JC92E-1234', 'Honda', 'CB125F', '2026-09-30', '2026-12-15', 'Available', '', '']],

function downloadAllAssets() {
  if (!window.XLSX) return alert('Spreadsheet engine still loading — please refresh and try again.');
  const all = S.assets || [];
  const wb = XLSX.utils.book_new();
  ASSET_SHEETS.forEach(([sheet, type, headers]) => {
    const rows = all.filter(a => a.type === type).map(a =>
      type === 'bike'  ? [a.code, a.plateNo || '', a.chassisNo || '', a.engineNo || '', a.brand || '', a.model || '', a.registrationExpiry || '', a.insuranceExpiry || '', a.status || '', a.holderCode || '', a.assignedDate || '']
    : type === 'sim'   ? [a.code, a.number || '', a.provider || '', a.puk || '', a.remarks || '', a.status || '', a.holderCode || '', a.assignedDate || '']
    :                    [a.code, a.name || '', a.status || '', a.holderCode || '', a.assignedDate || '']);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([headers, ...rows]), sheet);
  });

function openAssetImport() {

  openModal('assetImport');
}

function assetImportPick(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      const rows = [], counts = { bike: 0, sim: 0, other: 0 }, errors = [];
      wb.SheetNames.forEach(sheetName => {
        if (/read.?me|instruction/i.test(sheetName)) return;
        const type = assetSheetType(sheetName);
        XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: '' }).forEach(raw => {
          const row = { type };
          Object.keys(raw).forEach(h => {
            const key = ASSET_ALIAS[String(h).trim().toLowerCase()];
            if (!key) return;
            const realKey = key === '__pn' ? (type === 'sim' ? 'number' : 'plateNo') : key;
            let val = raw[h];
            if (realKey === 'registrationExpiry' || realKey === 'insuranceExpiry' || realKey === 'assignedDate') val = isoDate(val);
            row[realKey] = (typeof val === 'string') ? val.trim() : val;
          });
          if (!String(row.code || '').trim()) return;
          rows.push(row); counts[type] = (counts[type] || 0) + 1;
        });
      });
      S.assetImport = { rows, counts, errors, fileName: file.name, busy: false, result: null };
    } catch (err) {
      S.assetImport = { rows: null, counts: null, errors: ['Could not read this file: ' + err.message], fileName: file.name, busy: false, result: null };
    }
    R();
  };
  reader.onerror = () => { S.assetImport = { rows: null, counts: null, errors: ['Could not read the file.'], fileName: file.name, busy: false, result: null }; R(); };
  reader.readAsArrayBuffer(file);
}

async function saveAssetImport() {
  const imp = S.assetImport || {};
  if (!imp.rows || !imp.rows.length || imp.busy) return;
  S.assetImport.busy = true; R();
  try {
    const res = await api('POST', '/assets/bulk/import', { rows: imp.rows });
    S.assetImport.result = res; S.assetImport.busy = false;
    auditLog && auditLog(`Asset bulk import: +${res.added}, ~${res.updated}`);
    await loadAssets(true);
    R();
  } catch (e) {
    S.assetImport.busy = false; S.assetImport.errors = [e.message]; R();
  }
}

    ? `<tr><td colspan="${cols}" style="text-align:center;padding:2rem;color:var(--muted)">No ${type === 'bike' ? 'bikes' : type === 'sim' ? 'SIM cards' : 'assets'} ${(q || sf) ? 'match your filter' : 'yet'}.</td></tr>`

    ).join('');

  return `<div class="card">
    <div class="card-head">
      <h3>${type === 'bike' ? 'Bike Master' : type === 'sim' ? 'SIM Master' : 'Other Assets'}</h3>
      <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">

               oninput="S.assetSearch=this.value;R();var el=document.getElementById('assetsrch');if(el){el.focus();el.setSelectionRange(this.value.length,this.value.length);}"
               style="padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:260px"/>
        <select onchange="S.assetStatusFilter=this.value;R()" style="padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px">
          <option value="">All statuses</option>
          ${assetStatuses(type).map(s => `<option value="${s}" ${sf === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
        ${manage ? `<button class="btn g" onclick="openAssetModal('${type}','')"><i class="ti ti-plus"></i> Add ${type === 'bike' ? 'bike' : type === 'sim' ? 'SIM' : 'asset'}</button>` : ''}

/* ─── Asset modals ─────────────────────────────────────────── */
function openAssetModal(type, id) {
  const editing = id ? (S.assets || []).find(a => a.id === id) : null;
  S.editingAsset = editing || null;
  S.assetTypeDraft = editing ? editing.type : (type || 'bike');
  const known = ASSET_KNOWN[S.assetTypeDraft] || [];
  const custom = [];
  if (editing) {
    Object.keys(editing).forEach(k => {
      if (['id', 'type', 'code', 'name', 'status', 'assignedTo', 'assignedDate', 'holderName', 'holderCode', 'createdAt'].includes(k)) return;
      if (known.includes(k)) return;
      custom.push({ k, v: editing[k] });
    });
  }
  S.assetCustom = custom;
  openModal('assetModal');
}
function addAssetField() { if (!S.assetCustom) S.assetCustom = []; S.assetCustom.push({ k: '', v: '' }); R(); }
function rmAssetField(i) { (S.assetCustom || []).splice(i, 1); R(); }

function renderAssetModal() {
  const a = S.editingAsset;
  const type = S.assetTypeDraft || 'bike';
  const editing = !!a;
  const v = (k) => editing && a[k] != null ? String(a[k]).replace(/"/g, '&quot;') : '';
  const idLabel = type === 'bike' ? 'Bike ID' : type === 'sim' ? 'SIM ID' : 'Asset ID';
  const fieldsByType = type === 'bike' ? `
        <div class="field"><label>Plate number</label><input id="as-plateNo" value="${v('plateNo')}" placeholder="DXB 12345"/></div>
        <div class="field"><label>Chassis number</label><input id="as-chassisNo" value="${v('chassisNo')}"/></div>
        <div class="field"><label>Engine number</label><input id="as-engineNo" value="${v('engineNo')}"/></div>
        <div class="field"><label>Brand</label><input id="as-brand" value="${v('brand')}" placeholder="Honda"/></div>
        <div class="field"><label>Model</label><input id="as-model" value="${v('model')}" placeholder="CB125"/></div>
        <div class="field"><label>Registration expiry</label><input id="as-registrationExpiry" type="date" value="${v('registrationExpiry')}"/></div>
        <div class="field"><label>Insurance expiry</label><input id="as-insuranceExpiry" type="date" value="${v('insuranceExpiry')}"/></div>`
    : type === 'sim' ? `
        <div class="field"><label>Mobile number</label><input id="as-number" value="${v('number')}" placeholder="971501234567"/></div>
        <div class="field"><label>Provider</label><input id="as-provider" value="${v('provider')}" placeholder="Du / Etisalat"/></div>
        <div class="field"><label>PUK number</label><input id="as-puk" value="${v('puk')}"/></div>
        <div class="field full"><label>Remarks</label><input id="as-remarks" value="${v('remarks')}"/></div>`
    : `<div class="field full"><label>Name / description</label><input id="as-name" value="${v('name')}" placeholder="e.g. Helmet, Delivery box"/></div>`;

  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()" style="max-width:560px">
    <div class="modal-head"><h3><i class="ti ${type === 'bike' ? 'ti-motorbike' : type === 'sim' ? 'ti-device-mobile' : 'ti-box'}"></i> ${editing ? 'Edit' : 'Add'} ${type === 'bike' ? 'bike' : type === 'sim' ? 'SIM' : 'asset'}</h3><button class="close-btn" onclick="openModal(null)"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label>${idLabel}</label><input id="as-code" value="${v('code')}" placeholder="${type === 'bike' ? 'BIKE001' : type === 'sim' ? 'SIM001' : 'AST001'}" ${editing ? 'disabled' : ''}/></div>
        <div class="field"><label>Status</label><select id="as-status">${assetStatuses(type).map(s => `<option ${editing && a.status === s ? 'selected' : (!editing && s === 'Available' ? 'selected' : '')}>${s}</option>`).join('')}</select></div>
        ${fieldsByType}
      </div>
      <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">Extra fields
        <button class="btn sm" onclick="addAssetField()"><i class="ti ti-plus"></i> Add field</button>
      </div>
      <div id="asset-custom-fields">${(S.assetCustom || []).length === 0
        ? `<p style="color:var(--muted);font-size:12px">Add your own fields (e.g. colour, warranty, IMEI) — they are saved with the asset.</p>`
        : (S.assetCustom || []).map((f, i) => `<div style="display:flex;gap:8px;margin-bottom:8px">
            <input id="ascf-k-${i}" value="${String(f.k || '').replace(/"/g, '&quot;')}" placeholder="Field name" style="flex:1"/>
            <input id="ascf-v-${i}" value="${String(f.v || '').replace(/"/g, '&quot;')}" placeholder="Value" style="flex:1"/>
            <button class="btn sm" style="color:var(--red)" onclick="rmAssetField(${i})"><i class="ti ti-trash"></i></button>
          </div>`).join('')}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="openModal(null)">Cancel</button>
      <button class="btn g" onclick="saveAsset()"><i class="ti ti-check"></i> ${editing ? 'Save changes' : 'Add ' + (type === 'bike' ? 'bike' : type === 'sim' ? 'SIM' : 'asset')}</button>
    </div>
  </div></div>`;
}

async function saveAsset() {
  const editing = !!S.editingAsset;
  const type = S.assetTypeDraft || 'bike';
  const code = gv('as-code').trim();
  const status = gv('as-status');
  if (!editing && !code) { alert((type === 'bike' ? 'Bike ID' : type === 'sim' ? 'SIM ID' : 'Asset ID') + ' is required.'); return; }
  const data = {};
  (ASSET_KNOWN[type] || []).forEach(k => { const el = document.getElementById('as-' + k); if (el) data[k] = el.value.trim(); });
  const name = type === 'other' ? gv('as-name').trim() : (gv('as-name') || (editing ? S.editingAsset.name : '') || '');
  // gather custom fields from the live inputs
  (S.assetCustom || []).forEach((f, i) => {
    const k = (document.getElementById('ascf-k-' + i)?.value || '').trim();
    const val = (document.getElementById('ascf-v-' + i)?.value || '').trim();
    if (k) data[k] = val;
  });
  try {
    if (editing) {
      await api('PATCH', '/assets/' + S.editingAsset.id, { name, status, data });
    } else {
      await api('POST', '/assets', { type, code, name, status, data });
    }
    S.modal = null; S.editingAsset = null; S.assetCustom = [];
    await loadAssets(true);
    R();
  } catch (e) { alert('Error: ' + e.message); }
}

async function deleteAsset(id) {
  const a = (S.assets || []).find(x => x.id === id);
  const label = a ? (assetTypeLabel(a.type) + ' ' + a.code) : 'this asset';
  if (a && a.assignedTo && !confirm(label + ' is currently assigned to ' + (a.holderName || 'an employee') + '. Delete anyway?')) return;
  if (!(a && a.assignedTo) && !confirm('Delete ' + label + '? This cannot be undone.')) return;
  try {
    await api('DELETE', '/assets/' + id);
    await loadAssets(true);
    R();
  } catch (e) { alert('Error: ' + e.message); }
}

function openAssignAssetModal(assetId, employeeId) {
  S.assignAssetDraft = {
    assetId: assetId || '',
    employeeId: employeeId || '',
    assignedDate: new Date().toISOString().slice(0, 10),
    lockAsset: !!assetId,
    lockEmp: !!employeeId
  };
  openModal('assignAsset');
}

  const d = S.assignAssetDraft || {};
  const emps = (S.employees || []).filter(e => e.status !== 'Inactive' || e.id === d.employeeId);
  const available = (S.assets || []).filter(a => !a.assignedTo && a.status === 'Available');
  const asset = (S.assets || []).find(a => a.id === d.assetId);
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()" style="max-width:500px">
    <div class="modal-head"><h3><i class="ti ti-user-plus"></i> Assign asset</h3><button class="close-btn" onclick="openModal(null)"><i class="ti ti-x"></i></button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="field full"><label>Asset</label>
        ${d.lockAsset && asset
          ? `<input value="${assetTypeLabel(asset.type)} ${asset.code}${asset.name ? ' · ' + asset.name : ''}" disabled/>`
          : `<select id="asg-asset" onchange="S.assignAssetDraft.assetId=this.value">
              <option value="">— Select an available asset —</option>
              ${available.map(a => `<option value="${a.id}" ${d.assetId === a.id ? 'selected' : ''}>${assetTypeLabel(a.type)} ${a.code}${a.type === 'bike' && a.plateNo ? ' (' + a.plateNo + ')' : a.type === 'sim' && a.number ? ' (' + a.number + ')' : ''}</option>`).join('')}
            </select>`}
      </div>
      <div class="field full"><label>Employee</label>
        ${d.lockEmp
          ? `<input value="${((emps.find(e => e.id === d.employeeId) || {}).name) || ''} (${((emps.find(e => e.id === d.employeeId) || {}).empId) || ''})" disabled/>`
          : `<select id="asg-emp" onchange="S.assignAssetDraft.employeeId=this.value">
              <option value="">— Select employee —</option>
              ${emps.map(e => `<option value="${e.id}" ${d.employeeId === e.id ? 'selected' : ''}>${e.name} (${e.empId})</option>`).join('')}
            </select>`}
      </div>
      <div class="field"><label>Assigned date</label><input id="asg-date" type="date" value="${d.assignedDate || ''}" onchange="S.assignAssetDraft.assignedDate=this.value"/></div>
    </div>
    ${(!d.lockAsset && available.length === 0) ? `<div class="alert alert-w" style="margin-top:1rem"><i class="ti ti-info-circle"></i>No available assets to assign. Add one or return an assigned asset first.</div>` : ''}

    <div class="modal-foot"><button class="btn" onclick="openModal(null)">Cancel</button>

}

async function saveAssignAsset() {
  const d = S.assignAssetDraft || {};
  if (!d.assetId || !d.employeeId) { alert('Please select both an asset and an employee.'); return; }
  try {
    await api('POST', '/assets/' + d.assetId + '/assign', { employeeId: d.employeeId, assignedDate: d.assignedDate || undefined });
    S.modal = null; S.assignAssetDraft = null;
    await loadAssets(true);
    R();
  } catch (e) { alert('Error: ' + e.message); }
}

function unassignAsset(id) { openAssetReturn(id); }

function openAssetReturn(id) {
  const a = (S.assets || []).find(x => x.id === id);
  S.assetReturnDraft = { id, type: a ? a.type : 'other', code: a ? a.code : '', returnDate: new Date().toISOString().slice(0, 10) };
  openModal('assetReturn');
}

function renderAssetReturnModal() {
  const d = S.assetReturnDraft || {};
  const isBike = d.type === 'bike';
  return `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()" style="max-width:460px">
    <div class="modal-head"><h3><i class="ti ti-arrow-back-up"></i> Return ${assetTypeLabel(d.type)} ${d.code}</h3><button class="close-btn" onclick="openModal(null)"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="alert ${isBike ? 'alert-w' : 'alert-i'}"><i class="ti ti-info-circle"></i><div>${isBike
        ? 'A signed return form is <b>required</b> — the return is only recorded once the form is attached. The form is saved to the rider\'s profile and the bike folder.'
        : 'Records the return and marks the item Available again.'}</div></div>
      <div class="form-grid">
        <div class="field full"><label>Return date</label><input id="ret-date" type="date" value="${d.returnDate || ''}"/></div>
        <div class="field full"><label>New status</label><select id="ret-status">
          <option>Available</option>${isBike ? '<option>Maintenance</option><option>Accident</option><option>Inactive</option>' : '<option>Inactive</option>'}
        </select></div>
        <div class="field full"><label>Return form ${isBike ? '<span style="color:var(--red)">* required</span>' : '<span style="color:var(--muted)">(optional)</span>'}</label>
          <div class="upload-zone" style="padding:1.1rem" onclick="document.getElementById('ret-file').click()">
            <i class="ti ti-file-text" style="font-size:20px;color:var(--muted)"></i>
            <div style="font-size:12px;margin-top:5px;font-weight:600">Attach signed return form — PDF, JPG, PNG</div>
          </div>
          <input type="file" id="ret-file" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="document.getElementById('ret-lbl').textContent='✓ '+this.files[0]?.name"/>
          <div id="ret-lbl" style="font-size:12px;color:var(--green);margin-top:4px"></div>
        </div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="openModal(null)">Cancel</button>
      <button class="btn g" onclick="saveAssetReturn()"><i class="ti ti-check"></i> Record return</button></div>
  </div></div>`;
}

async function saveAssetReturn() {
  const d = S.assetReturnDraft || {};
  const returnDate = gv('ret-date');
  const status = gv('ret-status') || 'Available';
  const file = document.getElementById('ret-file')?.files[0];
  if (!returnDate) { alert('Please choose the return date.'); return; }
  if (d.type === 'bike' && !file) { alert('Please attach the signed return form — the return is only recorded once the form is attached.'); return; }
  try {
    const fd = new FormData();
    fd.append('returnDate', returnDate);
    fd.append('status', status);
    if (file) fd.append('file', file);
    await api('POST', '/assets/' + d.id + '/unassign', fd, true);
    S.modal = null; S.assetReturnDraft = null;
    await loadAssets(true);
    if (S.screen === 'admin') { try { S.documents = await api('GET', '/documents'); } catch (e) {} }
    R();
  } catch (e) { alert('Error: ' + e.message); }
}

/* ─── Reports ──────────────────────────────────────────────── */
function renderReports() {
  const stamp = new Date().toISOString().slice(0, 10);
  const groups = [
    ['Employees', 'ti-users', 'var(--blue)', [
      ['Employee details', 'Full employee master — every field for all staff.', '/employees/export', 'employees_' + stamp + '.xlsx'],
    ]],
    ['Leave', 'ti-calendar-event', 'var(--amber)', [
      ['Leave register', 'All leave requests with type, dates, status and approver.', '/leaves/export', 'leaves_' + stamp + '.xlsx'],
    ]],
    ['Payroll', 'ti-cash', 'var(--green)', [
      ['Payroll / payslips', 'All payslips — basic, allowances, deductions and net pay.', '/payslips/export', 'payslips_' + stamp + '.xlsx'],
    ]],
    ['Accommodation', 'ti-bed', '#7A5AF8', [
      ['Accommodation report', 'Current occupants, camp occupancy, and full stay history (3 sheets).', '/reports/accommodation', 'accommodation_report_' + stamp + '.xlsx'],
    ]],
    ['Fleet assets', 'ti-motorbike', '#185FA5', [
      ['Asset register', 'Every bike, SIM and other asset with its current holder (3 sheets).', '/reports/assets', 'asset_register_' + stamp + '.xlsx'],
    ]],
    ['Compliance', 'ti-alert-triangle', 'var(--red)', [
      ['Expiring documents', 'Visas expiring ≤90 days and bike registration/insurance ≤30 days.', '/reports/expiring', 'expiring_documents_' + stamp + '.xlsx'],
    ]],
  ];
  return `
  <div class="alert alert-i" style="margin-bottom:1.25rem"><i class="ti ti-download"></i><div>Each report downloads as an Excel (.xlsx) file and reflects live data at the moment you download it.</div></div>
  ${groups.map(([group, icon, color, items]) => `
    <div class="card" style="margin-bottom:1.1rem">
      <div class="card-head"><h3><i class="ti ${icon}" style="color:${color}"></i> ${group}</h3></div>
      <div class="card-body">
        ${items.map(([title, desc, path, file]) => `
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 13px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px">
            <div style="min-width:0">
              <div style="font-weight:600">${title}</div>
              <div style="font-size:12px;color:var(--muted)">${desc}</div>
            </div>
            <button class="btn g" style="flex-shrink:0" onclick="downloadReport('${path}','${file}')"><i class="ti ti-download"></i> Download</button>
          </div>`).join('')}
      </div>
    </div>`).join('')}
  ${renderCustomReportCard()}`;
}

function renderCustomReportCard() {
  const cols = [
    ['empId', 'Employee ID'], ['name', 'Name'], ['position', 'Position'], ['department', 'Department'],
    ['location', 'Location'], ['status', 'Status'], ['nationality', 'Nationality'], ['contact', 'Contact'],
    ['email', 'Email'], ['joiningDate', 'Joining date'], ['deploymentDate', 'Deployment date'], ['riderId', 'Rider ID'],
    ['passportNo', 'Passport'], ['eidNo', 'EID number'], ['evisaExpiry', 'E-visa expiry'], ['passportExpiry', 'Passport expiry'],
    ['eidExpiry', 'EID expiry'], ['laborCardExpiry', 'Labour card expiry'], ['licenseExpiry', 'Licence expiry'], ['contractExpiry', 'Contract expiry'],
    ['basicSalary', 'Basic'], ['housingSalary', 'Housing'], ['transportSalary', 'Transport'], ['foodSalary', 'Food']
  ];
  const def = ['empId', 'name', 'position', 'status'];
  return `<div class="card" style="margin-bottom:1.1rem">
    <div class="card-head"><h3><i class="ti ti-adjustments-alt" style="color:var(--green)"></i> Custom employee report</h3></div>
    <div class="card-body">
      <p style="font-size:12px;color:var(--muted);margin-bottom:.75rem">Pick the columns and (optionally) filter, then download your own Excel report.</p>
      <div class="section-label">Columns</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:7px;margin-bottom:.9rem">
        ${cols.map(([k, l]) => `<label style="display:flex;align-items:center;gap:7px;background:#fafaf8;border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:12px;cursor:pointer"><input type="checkbox" class="crcol" value="${k}" ${def.includes(k) ? 'checked' : ''} style="accent-color:var(--green)"/> ${l}</label>`).join('')}
      </div>
      <div class="section-label">Filters (optional)</div>
      <div class="form-grid">
        <div class="field"><label>Status</label><select id="cr-status"><option value="">Any</option><option>Active</option><option>Inactive</option></select></div>
        <div class="field"><label>Position contains</label><input id="cr-pos" placeholder="e.g. Rider"/></div>
        <div class="field"><label>Location contains</label><input id="cr-loc" placeholder="e.g. Dubai"/></div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:.5rem"><button class="btn g" onclick="buildCustomReport()"><i class="ti ti-download"></i> Download custom report</button></div>
    </div>
  </div>`;
}

function buildCustomReport() {
  const cols = [...document.querySelectorAll('.crcol:checked')].map(c => c.value);
  if (!cols.length) { alert('Please select at least one column.'); return; }
  const qs = new URLSearchParams();
  qs.set('cols', cols.join(','));
  const st = gv('cr-status'); if (st) qs.set('status', st);
  const pos = gv('cr-pos'); if (pos) qs.set('position', pos);
  const loc = gv('cr-loc'); if (loc) qs.set('location', loc);
  downloadReport('/reports/custom?' + qs.toString(), 'custom_employee_report_' + new Date().toISOString().slice(0, 10) + '.xlsx');
}

/* ─── Event Binding & Init ─────────────────────────────────── */
function bindEvents() {
  document.getElementById('lid')?.addEventListener('keydown',   e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('lpass')?.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('admin-email')?.addEventListener('keydown', e => { if (e.key === 'Enter') requestOtp(); });
  document.getElementById('otp-input')?.addEventListener('keydown',   e => { if (e.key === 'Enter') verifyOtp(); });
  // Auto-verify when 6 digits entered
  document.getElementById('otp-input')?.addEventListener('input', e => {
    if (e.target.value.replace(/\D/g,'').length === 6) verifyOtp();
  });
  document.getElementById('emp-otp')?.addEventListener('keydown', e => { if (e.key === 'Enter') verifyEmpOtp(); });
  document.getElementById('emp-otp')?.addEventListener('input', e => {
    if (e.target.value.replace(/\D/g,'').length === 6) verifyEmpOtp();
  });
  if (document.getElementById('lt')) toggleCertField();
}
 
async function init() {
  if (S.token && S.user) {
    try {
      S.screen = S.user.role === 'admin' ? 'admin' : 'employee';
      await loadCfg();
      await loadData();
      if (S.screen === 'employee') {
        const own = await api('GET', '/employees');   // employee role → returns own record only
        S.employees = own;
        S.viewEmp = (own && own[0]) || null;
      }
    } catch (e) {
      // Token expired — force re-login
      S.token = ''; S.user = null; S.screen = 'login';
      localStorage.removeItem('hrms_token');
      localStorage.removeItem('hrms_user');
    }
  }
  R();
}
 
init();
 
</script>
<script>
/* ============================================================
   Noon Fleet HRMS — Tweaks panel
   Three expressive controls that reshape the whole feel.
   Mounted on <body> (outside #root) so it survives R() re-renders.
   All effects flow through design tokens + two override <style>s.
   ============================================================ */
(function () {
  var LS = { accent: 'tw_accent', density: 'tw_density', shape: 'tw_shape' };

  /* ── Accent moods: each recolours the entire brand palette ── */
  var ACCENTS = {
    noon:     { label: 'Noon',     dot: '#3E18A8', green:'#3E18A8', dark:'#2A1178', light:'#ECE8FA', b2:'#5B34D6', ink:'#17123A', ink2:'#221A52', yellow:'#FFDD00' },
    indigo:   { label: 'Indigo',   dot: '#3538CD', green:'#3538CD', dark:'#252A9E', light:'#E7E8FB', b2:'#5457E6', ink:'#12142E', ink2:'#1C1F44', yellow:'#4FD1C5' },
    royal:    { label: 'Royal',    dot: '#7A1FA2', green:'#7A1FA2', dark:'#5B1580', light:'#F3E8FA', b2:'#A23DC8', ink:'#241236', ink2:'#331B4B', yellow:'#F6C453' },
    graphite: { label: 'Graphite', dot: '#4B3F8F', green:'#4B3F8F', dark:'#332B66', light:'#ECEBF3', b2:'#6A5DB8', ink:'#0E1020', ink2:'#191A2E', yellow:'#A78BFA' }
  };

  /* ── Density: reshapes the app's spatial rhythm ── */
  var DENSITY = {
    compact: 'body{font-size:13px}.page{padding:1rem}.card-body{padding:1rem}.card-head{padding:.65rem 1rem}.stat{padding:.8rem}.stats-row{gap:8px}td{padding:7px 10px}th{padding:7px 10px}.nav-link{padding:7px 1.4rem}.card{margin-bottom:.8rem}.info-cell{padding:.7rem .85rem}',
    cozy: '',
    spacious: '.page{padding:2.3rem}.card-body{padding:1.8rem}.card-head{padding:1.3rem 1.6rem}.stat{padding:1.4rem}.stats-row{gap:18px}td{padding:15px 16px}th{padding:13px 16px}.nav-link{padding:13px 1.5rem}.card{margin-bottom:1.6rem}.info-cell{padding:1.3rem 1.4rem}'
  };

  /* ── Shape: global corner language ── */
  var SHAPE = {
    sharp: { vars:{ '--r-sm':'2px','--r':'3px','--r-lg':'5px' },
      css:'.stat{border-radius:4px}.auth-box{border-radius:6px!important}.btn,.btn-primary{border-radius:4px!important}.badge{border-radius:4px}.avatar{border-radius:5px}.avatar.lg{border-radius:6px}.role-switch,.role-btn{border-radius:4px}.logo-chip{border-radius:5px}.field input,.field select,.field textarea{border-radius:4px}.modal{border-radius:6px}' },
    rounded: { vars:{ '--r-sm':'9px','--r':'13px','--r-lg':'18px' },
      css:'.stat{border-radius:14px}' },
    soft: { vars:{ '--r-sm':'14px','--r':'20px','--r-lg':'28px' },
      css:'.stat{border-radius:24px}.auth-box{border-radius:30px!important}.btn{border-radius:14px!important}.btn-primary{border-radius:16px!important}.avatar.lg{border-radius:26px}.role-switch{border-radius:16px}.role-btn{border-radius:13px}.logo-chip{border-radius:18px}.field input,.field select,.field textarea{border-radius:13px}.modal{border-radius:24px}' }
  };

  var state = {
    accent:  localStorage.getItem(LS.accent)  || 'noon',
    density: localStorage.getItem(LS.density) || 'cozy',
    shape:   localStorage.getItem(LS.shape)   || 'rounded'
  };

  function styleEl(id) {
    var s = document.getElementById(id);
    if (!s) { s = document.createElement('style'); s.id = id; document.head.appendChild(s); }
    return s;
  }

  function apply() {
    var root = document.documentElement.style;
    var a = ACCENTS[state.accent] || ACCENTS.noon;
    root.setProperty('--green', a.green);
    root.setProperty('--green-dark', a.dark);
    root.setProperty('--green-light', a.light);
    root.setProperty('--brand', a.green);
    root.setProperty('--brand-2', a.b2);
    root.setProperty('--ink', a.ink);
    root.setProperty('--ink-2', a.ink2);
    root.setProperty('--yellow', a.yellow);

    styleEl('tweak-density').textContent = DENSITY[state.density] || '';

    var sh = SHAPE[state.shape] || SHAPE.rounded;
    var shVars = '';
    for (var k in sh.vars) shVars += k + ':' + sh.vars[k] + ';';
    styleEl('tweak-shape').textContent = ':root{' + shVars + '}' + sh.css;

    // reflect active buttons in the panel
    document.querySelectorAll('.tw-seg[data-group]').forEach(function (btn) {
      btn.classList.toggle('on', state[btn.dataset.group] === btn.dataset.val);
    });
  }

  function set(group, val) {
    state[group] = val;
    localStorage.setItem(LS[group], val);
    apply();
  }
  window.__setTweak = set;

  function seg(group, opts) {
    return '<div class="tw-segrow">' + opts.map(function (o) {
      return '<button class="tw-seg" data-group="' + group + '" data-val="' + o[0] + '" onclick="__setTweak(\'' + group + '\',\'' + o[0] + '\')">' + o[1] + '</button>';
    }).join('') + '</div>';
  }

  function build() {
    if (document.getElementById('tw-root')) return;
    var wrap = document.createElement('div');
    wrap.id = 'tw-root';
    wrap.innerHTML =
      '<style>' +
      '#tw-root{position:fixed;right:20px;bottom:20px;z-index:990;font-family:"Plus Jakarta Sans",system-ui,sans-serif}' +
      '#tw-fab{display:inline-flex;align-items:center;gap:8px;background:var(--green,#3E18A8);color:#fff;border:none;border-radius:999px;padding:11px 17px;font:600 13px/1 "Plus Jakarta Sans",system-ui;cursor:pointer;box-shadow:0 12px 28px -8px rgba(20,10,60,.55)}' +
      '#tw-fab i{font-size:16px}' +
      '#tw-panel{position:absolute;right:0;bottom:56px;width:296px;background:#fff;border:1px solid rgba(30,20,80,.12);border-radius:18px;box-shadow:0 30px 70px -20px rgba(10,5,40,.5);padding:16px 16px 14px;transform-origin:bottom right;transition:opacity .16s,transform .16s;opacity:0;transform:scale(.94) translateY(8px);pointer-events:none}' +
      '#tw-root.open #tw-panel{opacity:1;transform:none;pointer-events:auto}' +
      '.tw-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}' +
      '.tw-hd b{font-size:14px;font-weight:800;letter-spacing:-.01em;color:#1a1533}' +
      '.tw-hd span{font-size:10.5px;color:#9c98ae;font-weight:600}' +
      '.tw-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6a6580;margin:14px 0 7px}' +
      '.tw-lbl:first-of-type{margin-top:4px}' +
      '.tw-segrow{display:flex;gap:5px;background:#f0eef8;border-radius:11px;padding:4px}' +
      '.tw-seg{flex:1;padding:7px 4px;border:none;background:transparent;border-radius:8px;font:600 11.5px/1.2 "Plus Jakarta Sans",system-ui;color:#6a6580;cursor:pointer;transition:background .12s,color .12s}' +
      '.tw-seg:hover{color:#1a1533}' +
      '.tw-seg.on{background:#fff;color:var(--green,#3E18A8);box-shadow:0 2px 6px rgba(30,20,80,.14)}' +
      '.tw-dots{display:flex;gap:4px;margin-top:8px;justify-content:flex-end}' +
      '.tw-reset{background:none;border:none;color:#9c98ae;font:600 11px "Plus Jakarta Sans",system-ui;cursor:pointer;padding:0}' +
      '.tw-reset:hover{color:var(--green,#3E18A8)}' +
      '</style>' +
      '<div id="tw-panel">' +
        '<div class="tw-hd"><b>Appearance</b><span>reshape the feel</span></div>' +
        '<div class="tw-lbl">Accent mood</div>' +
        seg('accent', [['noon','Noon'],['indigo','Indigo'],['royal','Royal'],['graphite','Graphite']]) +
        '<div class="tw-lbl">Density</div>' +
        seg('density', [['compact','Compact'],['cozy','Cozy'],['spacious','Spacious']]) +
        '<div class="tw-lbl">Shape</div>' +
        seg('shape', [['sharp','Sharp'],['rounded','Rounded'],['soft','Soft']]) +
        '<div class="tw-dots"><button class="tw-reset" onclick="__resetTweaks()">Reset to Noon default</button></div>' +
      '</div>' +
      '<button id="tw-fab"><i class="ti ti-adjustments-horizontal"></i> Tweaks</button>';
    document.body.appendChild(wrap);
    document.getElementById('tw-fab').onclick = function (e) {
      e.stopPropagation(); wrap.classList.toggle('open');
    };
    document.addEventListener('click', function (e) {
      if (wrap.classList.contains('open') && !wrap.contains(e.target)) wrap.classList.remove('open');
    });
    apply();
  }

  window.__resetTweaks = function () {
    set('accent','noon'); set('density','cozy'); set('shape','rounded');
  };

  // Tokens must be live immediately (before panel DOM) so first paint is themed.
  apply();
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', build);
  else build();
})();
</script>
