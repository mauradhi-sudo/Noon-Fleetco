steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/noon-fleet-hrms:$SHORT_SHA'
      - '.'

  # Push image to Google Cloud Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/noon-fleet-hrms:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/noon-fleet-hrms:$SHORT_SHA'
      - '--location=asia-southeast1'

images:
  - 'gcr.io/$PROJECT_ID/noon-fleet-hrms:$SHORT_SHA'

timeout: '3600s'
